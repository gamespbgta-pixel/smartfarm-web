<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งรหัสผ่านใหม่ - Smart Farm</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #4CAF50, #2E7D32); font-family: 'Kanit', sans-serif; margin: 0; }
        .container-box { width: 90%; max-width: 380px; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .title { font-size: 24px; font-weight: 600; margin-bottom: 25px; color: #1B5E20; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #444; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #2E7D32; color: white; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { background: #1B5E20; }
        .message { text-align: center; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container-box">
    <div class="title">ตั้งรหัสผ่านใหม่</div>
    <form id="reset-form">
        <div class="input-group">
            <label>รหัสผ่านใหม่ (6 ตัวขึ้นไป)</label>
            <input type="password" id="new-password" required>
        </div>
        <button type="submit" id="btn-submit" class="btn-action">บันทึกรหัสผ่าน</button>
    </form>
    <div id="message-display" class="message"></div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    
    // ใส่ค่า Config เดียวกับหน้า Login ของคุณ
    const supabase = createClient("https://zweosffxlaghnrvimdwx.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE");

    const resetForm = document.getElementById("reset-form");
    const newPasswordInput = document.getElementById("new-password");
    const messageDisplay = document.getElementById("message-display");

    resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const newPassword = newPasswordInput.value;

        // อัปเดตรหัสผ่านผ่าน Supabase
        const { error } = await supabase.auth.updateUser({ password: newPassword });

        if (error) {
            messageDisplay.innerText = "เกิดข้อผิดพลาด: " + error.message;
            messageDisplay.style.color = "red";
        } else {
            messageDisplay.innerText = "เปลี่ยนรหัสผ่านสำเร็จ! กำลังไปหน้าเข้าสู่ระบบ...";
            messageDisplay.style.color = "green";
            setTimeout(() => { window.location.href = "index.html"; }, 2000);
        }
    });
</script>
</body>
</html>
