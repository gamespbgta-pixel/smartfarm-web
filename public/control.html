<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm - Control System (Supabase & WebSocket)</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;600&display=swap" rel="stylesheet">

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = "https://zweosffxlaghnrvimdwx.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let ws;
let devices = [];
let currentUser = null;
let lastTriggered = {};

// 1. ตรวจสอบสถานะการล็อกอินสมาชิก
async function checkAuthAndLoad() {
    const { data: { user }, error } = await supabase.auth.getUser();
    
    if (error || !user) {
        alert("กรุณาเข้าสู่ระบบก่อนใช้งานหน้าควบคุม");
        window.location.href = "login.html";
        return;
    }
    
    currentUser = user;
    document.getElementById('user-display').innerText = `👤 ผู้ใช้งาน: ${user.email}`;
    
    // โหลดข้อมูลจากฐานข้อมูล และ เปิดการเชื่อมต่อ WebSocket สั่งงานบอร์ด
    loadDevicesFromSupabase();
    connectWS();
}

// 2. ดึงข้อมูลอุปกรณ์และตั้งเวลาจาก Supabase (ดึงเฉพาะของเจ้าของบัญชี)
async function loadDevicesFromSupabase() {
    if (!currentUser) return;
    console.log("กำลังดึงข้อมูลอุปกรณ์ของคุณจาก Supabase...");
    
    const { data: dbDevices, error: devError } = await supabase
        .from('devices')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: true });

    if (devError) { console.error(devError); return; }
    
    devices = dbDevices || [];

    // ดึงสถานะ ล่าสุด (ON/OFF) ของอุปกรณ์จากตาราง Log ความเคลื่อนไหว
    for (let i = 0; i < devices.length; i++) {
        const { data: logData } = await supabase
            .from('device_status_logs')
            .select('status')
            .eq('device_id', devices[i].id)
            .order('changed_at', { ascending: false })
            .limit(1);
        
        devices[i].state = (logData && logData.length > 0) ? (logData[0].status ? "ON" : "OFF") : "OFF";
    }

    renderDevices();
}

// 3. เรนเดอร์สร้าง UI บนหน้าจอพล็อตใส่บล็อก Slot 1-8
function renderDevices() {
    document.getElementById('deviceArea').innerHTML = `
        <div class="slot empty">ช่องที่ 1</div><div class="slot empty">ช่องที่ 2</div>
        <div class="slot empty">ช่องที่ 3</div><div class="slot empty">ช่องที่ 4</div>
        <div class="slot empty">ช่องที่ 5</div><div class="slot empty">ช่องที่ 6</div>
        <div class="slot empty">ช่องที่ 7</div><div class="slot empty">ช่องที่ 8</div>`;
    
    document.getElementById('deviceSelect').innerHTML = '<option value="">เลือกอุปกรณ์</option>';

    devices.forEach(d => {
        createDeviceUI(d);
    });
}

function createDeviceUI(d) {
    const slot = document.querySelector(".slot.empty");
    if (!slot) return;

    slot.classList.remove("empty");
    slot.setAttribute("data-id", d.id);
    slot.setAttribute("data-pin", d.pin);
    
    const cleanOn = d.on_key ? d.on_key.trim() : "";
    const cleanOff = d.off_key ? d.off_key.trim() : "";
    const cleanState = d.state ? d.state.trim().toLowerCase() : "off";

    slot.innerHTML = `
        <button class="deleteBtn" data-id="${d.id}">✕</button>
        <h4>${d.name}</h4>
        <button class="device ${cleanState} device-toggle" data-id="${d.id}" data-pin="${d.pin}">
            ${cleanState.toUpperCase()}
        </button>
        <div class="info">GPIO: ${d.pin}</div>
        <div class="info">🎤 เปิด: ${cleanOn}</div>
        <div class="info">🎤 ปิด: ${cleanOff}</div>
        <div class="info timeInfo">
            ⏰ เปิด: ${d.time_on || "-"}<br>
            ⏰ ปิด: ${d.time_off || "-"}
        </div>
    `;

    // อัปเดตรายชื่อใน Dropdown เมนูตั้งเวลา
    const option = document.createElement("option");
    option.value = d.id;
    option.textContent = d.name;
    document.getElementById('deviceSelect').appendChild(option);
}

// 4. ฟังก์ชันเพิ่มอุปกรณ์ใหม่ลงตาราง Supabase
async function addDevice() {
    if (!currentUser) return;
    const nameInput = document.getElementById('deviceName');
    const onKeyInput = document.getElementById('onKey');
    const offKeyInput = document.getElementById('offKey');
    const pinInputElement = document.getElementById('pinInput');

    const name = nameInput.value.trim();
    const on = onKeyInput.value.trim();
    const off = offKeyInput.value.trim();
    const pin = pinInputElement.value.trim();

    if (!name || !on || !off || !pin) { alert("กรอกข้อมูลให้ครบทุกช่องก่อนครับ"); return; }

    // ตรวจสอบขา GPIO ซ้ำซ้อนภายในบัญชีตัวเอง
    if (devices.some(d => d.pin === pin)) { alert("GPIO นี้ถูกใช้งานไปแล้วครับ"); return; }

    const { data, error } = await supabase
        .from('devices')
        .insert([{ 
            name: name, 
            on_key: on, 
            off_key: off, 
            pin: pin,
            user_id: currentUser.id
        }]);

    if (error) {
        alert("เกิดข้อผิดพลาด: " + error.message);
    } else {
        alert("เพิ่มอุปกรณ์เข้าสู่ระบบสำเร็จ!");
        nameInput.value = ""; onKeyInput.value = ""; offKeyInput.value = ""; pinInputElement.value = "";
        loadDevicesFromSupabase(); 
    }
}

// 5. ฟังก์ชันลบอุปกรณ์ออกจากตาราง
async function deleteDevice(id) {
    if (confirm("คุณต้องการลบอุปกรณ์ตัวนี้ใช่หรือไม่?")) {
        const { error } = await supabase
            .from('devices')
            .delete()
            .eq('id', id);

        if (error) { alert(error.message); } else { loadDevicesFromSupabase(); }
    }
}

// 6. ฟังก์ชันเปลี่ยนสถานะ (บันทึกลงฐานข้อมูลและสั่งส่งออก WebSocket สู่บอร์ดจริง)
async function setDeviceState(id, pin, state, sendWS = true) {
    const lowerState = state.toLowerCase();
    const isStatusOn = lowerState === "on";

    // กราวด์ข้อมูลอัปเดตลงตารางประวัติกิจกรรม (device_status_logs) เพื่อใช้ดึงดูย้อนหลัง 7 วัน
    const { error } = await supabase
        .from('device_status_logs')
        .insert([{ device_id: id, status: isStatusOn }]);

    if (error) {
        console.error("บันทึกสถานะผิดพลาด:", error.message);
        return;
    }

    // อัปเดตสถานะในตัวแปร Array บนเว็บซอร์สโค้ดปัจจุบัน
    devices.forEach(d => { if (d.id == id) { d.state = isStatusOn ? "ON" : "OFF"; } });
    
    // เปลี่ยนสีสันปุ่มบนหน้าจอสดๆ 
    const btn = document.querySelector(`button.device-toggle[data-id='${id}']`);
    if (btn) {
        btn.className = "device device-toggle " + lowerState;
        btn.innerText = state.toUpperCase();
    }

    // ส่งชุดคำสั่งสั่งการผ่านระบบท่อ WebSocket ข้ามไปยังเครื่องเซิร์ฟเวอร์หลักบอร์ดฮาร์ดแวร์
    if (sendWS && ws && ws.readyState === 1) {
        ws.send(JSON.stringify({
            type: "control",
            device: pin,
            status: lowerState
        }));
    }
}

// 7. ระบบบันทึกเวลาเปิด-ปิดอัตโนมัติลงบนตาราง Supabase
async function saveSchedule() {
    const id = document.getElementById('deviceSelect').value;
    const onTime = document.getElementById('timeOn').value;
    const offTime = document.getElementById('timeOff').value;
    if (!id) { alert("โปรดเลือกอุปกรณ์ก่อนบันทึกเวลาครับ"); return; }

    const { error } = await supabase
        .from('devices')
        .update({ time_on: onTime, time_off: offTime })
        .eq('id', id);

    if (error) {
        alert("บันทึกเวลาไม่สำเร็จ: " + error.message);
    } else {
        document.getElementById('scheduleStatus').innerText = "บันทึกเวลาลงฐานข้อมูลเรียบร้อย!";
        setTimeout(() => { document.getElementById('scheduleStatus').innerText = ""; }, 3000);
        loadDevicesFromSupabase();
    }
}

// 8. ลูปทำงานตรวจสอบเวลา (คล็อกปลุกอัตโนมัติ) ตรวจเช็คทุก 5 วินาที
setInterval(() => {
    const now = new Date();
    const time = now.getHours().toString().padStart(2, "0") + ":" + now.getMinutes().toString().padStart(2, "0");

    devices.forEach(s => {
        const currentState = s.state ? s.state.toLowerCase() : "off";
        
        if (s.time_on == time && currentState !== "on" && lastTriggered[s.id + "_on"] != time) {
            setDeviceState(s.id, s.pin, "on", true);
            lastTriggered[s.id + "_on"] = time;
        }
        if (s.time_off == time && currentState !== "off" && lastTriggered[s.id + "_off"] != time) {
            setDeviceState(s.id, s.pin, "off", true);
            lastTriggered[s.id + "_off"] = time;
        }
    });
}, 5000);

// 9. ระบบเปิดไมค์คำสั่งเสียงอัจฉริยะ (Voice Command)
let recognition;
function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { document.getElementById("voiceText").innerText = "เบราว์เซอร์ไม่รองรับ"; return; }

    if (recognition) { try { recognition.abort(); } catch (e) {} }

    recognition = new SpeechRecognition();
    recognition.lang = "th-TH";
    document.getElementById("voiceText").innerText = "กำลังฟัง... พูดได้เลยครับ";
    recognition.start();

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript.toLowerCase().trim();
        document.getElementById("voiceText").innerText = "คุณพูดว่า: " + text;

        devices.forEach(d => {
            const wordOn = d.on_key.toLowerCase().trim();
            const wordOff = d.off_key.toLowerCase().trim();

            if (text === wordOn || (wordOn.length > 2 && text.includes(wordOn))) {
                setDeviceState(d.id, d.pin, "on", true);
            } 
            if (text === wordOff || (wordOff.length > 2 && text.includes(wordOff))) {
                setDeviceState(d.id, d.pin, "off", true);
            }
        });
    };
}

// 10. ท่อเชื่อมต่อข้อความสดข้ามฝั่ง (WebSocket Gateway)
function connectWS() {
    const renderHost = "smartfarm-server-fuos.onrender.com";
    ws = new WebSocket("wss://" + renderHost);

    ws.onopen = () => {
        ws.send(JSON.stringify({ type: "web" }));
    };

    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        // เมื่อได้รับสัญญาณจากฝั่งบอร์ด ESP32 อัปเดตสลับค่าตามจริงกลับมา
        if (data.device) {
            const match = devices.find(d => d.pin == data.device);
            if (match) {
                setDeviceState(match.id, match.pin, data.status, false);
            }
        }
    };

    ws.onclose = () => { setTimeout(connectWS, 5000); };
}

// 11. ออกจากระบบบัญชี
async function logout() {
    await supabase.auth.signOut();
    window.location.href = "login.html";
}

// ผูกฟังก์ชันเข้ากับวินโดว์เพื่อให้ปุ่ม HTML (onclick) เรียกใช้งานได้
window.addDevice = addDevice;
window.startVoice = startVoice;
window.saveSchedule = saveSchedule;
window.logout = logout;
window.goPage2 = () => { window.location.href = "dashboard.html"; };

// มอบหมาย Event Click สั่งงานปุ่มภายในโครงสร้างแบบไดนามิก
document.addEventListener('click', function(e) {
    if (e.target && e.target.classList.contains('deleteBtn')) {
        deleteDevice(e.target.getAttribute('data-id'));
    }
    if (e.target && e.target.classList.contains('device-toggle')) {
        const id = e.target.getAttribute('data-id');
        const pin = e.target.getAttribute('data-pin');
        const nextState = e.target.classList.contains("on") ? "off" : "on";
        setDeviceState(id, pin, nextState, true);
    }
});

// รันการตรวจสอบความปลอดภัยของสิทธิ์ผู้ใช้ทันทีเมื่อเปิดหน้าจอ
checkAuthAndLoad();
</script>
