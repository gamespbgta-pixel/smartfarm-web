<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Farm Login</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4CAF50,#2E7D32);
}

.login-box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    font-size:32px;
    margin-bottom:10px;
}

.title{
    text-align:center;
    font-size:24px;
    font-weight:600;
    margin-bottom:25px;
    color:#2E7D32;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    color: #555;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    outline: none;
}

.input-group input:focus {
    border-color: #4CAF50;
    box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
}

.btn-login{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    margin-top: 10px;
}

.btn-login:hover{
    background:#388E3C;
}

.error{
    text-align:center;
    color:red;
    margin-top:15px;
    font-size:14px;
    min-height: 20px; /* จองพื้นที่ไว้ไม่ให้กล่องขยับตอนแสดงข้อความผิดพลาด */
}
</style>
</head>

<body>

<div class="login-box">

    <div class="logo">🌱</div>

    <div class="title">
        Smart Farm Login
    </div>

    <form onsubmit="event.preventDefault(); login();">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" required autocomplete="username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login">
            เข้าสู่ระบบ
        </button>
    </form>

    <div id="error" class="error"></div>

</div>

<script>
function login(){
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const errorDisplay = document.getElementById("error");

    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    // ล้างข้อความแจ้งเตือนเก่าก่อนตรวจข้อมููลใหม่
    errorDisplay.innerText = "";

    // ตรวจสอบเงื่อนไขบัญชีผู้ใช้
    if(username === "admin" && password === "1234"){
        // เปลี่ยนทิศทางไปหน้าแรกของระบบควบคุม (index.html)
        window.location.href = "index.html";
    } else {
        errorDisplay.innerText = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
        // ล้างช่องรหัสผ่านเพื่อให้กรอกใหม่
        passwordInput.value = "";
        passwordInput.focus();
    }
}
</script>

</body>
</html>
