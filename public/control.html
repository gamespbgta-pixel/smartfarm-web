<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm - Control (Supabase Integration)</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Kanit',sans-serif;
background:linear-gradient(135deg,#e8f5e9,#f1f8ff);
}
.header{
background:linear-gradient(135deg,#2ecc71,#27ae60);
padding:16px 28px;
color:#fff;
font-size:20px;
font-weight:600;
position:relative;
}
.page2btn{
position:absolute;
right:20px;
top:12px;
background:#fff;
color:#27ae60;
border:none;
padding:8px 16px;
border-radius:12px;
cursor:pointer;
font-weight: 600;
}
.container{
max-width:1300px;
margin:auto;
padding:30px;
}
.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:26px;
}
.card{
background:#fff;
padding:22px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:24px;
}
.device-area{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}
.slot{
border:2px dashed #cfd8dc;
border-radius:18px;
padding:14px;
min-height:230px;
text-align:center;
position:relative;
}
.slot.empty{
display:flex;
align-items:center;
justify-content:center;
color:#95a5a6;
}
.device{
width:90px;
height:90px;
border-radius:50%;
border:none;
font-size:18px;
margin:12px auto;
cursor:pointer;
font-weight: 600;
}
.device.on{background:#2ecc71;color:#fff;}
.device.off{background:#e74c3c;color:#fff;}

.deleteBtn{
position:absolute;
top:8px;
right:8px;
width:30px;
height:30px;
border-radius:50%;
border:none;
background:#e74c3c;
color:#fff;
font-size:18px;
cursor:pointer;
display: flex;
align-items: center;
justify-content: center;
}
input,select{
width:100%;
padding:10px;
border-radius:14px;
border:1px solid #ddd;
margin-bottom:10px;
font-family: 'Kanit', sans-serif;
}
.add{
width:100%;
padding:12px;
border:none;
border-radius:16px;
background:#27ae60;
color:#fff;
cursor:pointer;
font-family: 'Kanit', sans-serif;
font-weight: 600;
font-size: 16px;
}
.info{font-size:14px;margin-top:6px;}
</style>
</head>

<body>

<div class="header">
🌱 Smart Farm Control System (Supabase)
<button class="page2btn" onclick="goPage2()">ไปหน้าแดชบอร์ด →</button>
</div>

<div class="container">
<div class="main">

<div class="card">
<h3>🔌 อุปกรณ์</h3>
<div class="device-area" id="deviceArea">
<div class="slot empty">ช่องที่ 1</div>
<div class="slot empty">ช่องที่ 2</div>
<div class="slot empty">ช่องที่ 3</div>
<div class="slot empty">ช่องที่ 4</div>
<div class="slot empty">ช่องที่ 5</div>
<div class="slot empty">ช่องที่ 6</div>
<div class="slot empty">ช่องที่ 7</div>
<div class="slot empty">ช่องที่ 8</div>
</div>
</div>

<div>

<div class="card">
<h3>➕ เพิ่มอุปกรณ์</h3>
<input id="deviceName" placeholder="ชื่ออุปกรณ์">
<input id="onKey" placeholder="คำเปิด">
<input id="offKey" placeholder="คำปิด">
<input id="locationInput" placeholder="สถานที่ติดตั้ง เช่น โรงเรือน 1">
<button class="add" onclick="addDevice()">เพิ่ม</button>
</div>

<div class="card">
<h3>🎙️ คำสั่งเสียง</h3>
<button class="add" onclick="startVoice()">เริ่มพูด</button>
<p id="voiceText" style="font-weight: bold; color: #27ae60;">รอฟัง...</p>
</div>

</div>
</div>
</div>

<script>
// 2. ตั้งค่าการเชื่อมต่อฐานข้อมูลของคุณ
const SUPABASE_URL = "zweosffxlaghnrvimdwx"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let devices = [];

// ฟังก์ชันหลักในการดึงรายชื่ออุปกรณ์และสถานะล่าสุดมาแสดงผล
async function loadDevices() {
    console.log("กำลังโหลดข้อมูลจาก Supabase...");
    
    // ดึงอุปกรณ์ทั้งหมด
    const { data: dbDevices, error: devError } = await supabase
        .from('devices')
        .select('*')
        .order('created_at', { ascending: true });

    if (devError) { console.error(devError); return; }
    
    devices = dbDevices || [];

    // วนลูปเพื่อไปค้นหาสถานะปัจจุบัน (On/Off) ล่าสุดของแต่ละอุปกรณ์
    for (let i = 0; i < devices.length; i++) {
        const { data: logData } = await supabase
            .from('device_status_logs')
            .select('status')
            .eq('device_id', devices[i].id)
            .order('changed_at', { ascending: false })
            .limit(1);
        
        // ถ้าเคยมีการกดยังมีประวัติ ให้เซ็ตค่าตามนั้น ถ้าไม่มีให้ดั้งเดิมเป็น off
        devices[i].state = (logData && logData.length > 0) ? (logData[0].status ? "ON" : "OFF") : "OFF";
    }

    renderDevices();
}

function renderDevices() {
    document.getElementById('deviceArea').innerHTML = `
        <div class="slot empty">ช่องที่ 1</div><div class="slot empty">ช่องที่ 2</div>
        <div class="slot empty">ช่องที่ 3</div><div class="slot empty">ช่องที่ 4</div>
        <div class="slot empty">ช่องที่ 5</div><div class="slot empty">ช่องที่ 6</div>
        <div class="slot empty">ช่องที่ 7</div><div class="slot empty">ช่องที่ 8</div>`;

    devices.forEach(d => {
        createDeviceUI(d);
    });
}

function createDeviceUI(d){
    const slot = document.querySelector(".slot.empty");
    if(!slot) return;

    slot.classList.remove("empty");
    slot.setAttribute("data-id", d.id); // ผูก UUID แทนค่า GPIO เดิม
    
    const cleanState = d.state ? d.state.toLowerCase() : "off";

    // เพื่อรักษาฟังก์ชันคำสั่งเสียงเดิมไว้ เราจะดึงข้อมูลเพิ่มจากช่อง Location มาประยุกต์เป็น คำเปิด/คำปิด ชั่วคราว
    // (หมายเหตุ: ในระบบจริงแนะนำให้แก้ไขเพิ่มคอลัมน์ on_key, off_key ในตาราง devices เพิ่มเติมครับ)
    const mockOnKey = "เปิด" + d.name;
    const mockOffKey = "ปิด" + d.name;

    slot.innerHTML=`
        <button class="deleteBtn" onclick="deleteDevice('${d.id}')">✕</button>
        <h4>${d.name}</h4>
        <button class="device ${cleanState}" onclick="toggleDevice('${d.id}')">
            ${cleanState.toUpperCase()}
        </button>
        <div class="info">สถานที่: ${d.location || "-"}</div>
        <div class="info">🎤 เปิด: ${mockOnKey}</div>
        <div class="info">🎤 ปิด: ${mockOffKey}</div>
    `;
}

// ฟังก์ชันเพิ่มข้อมูลลงตาราง devices ของ Supabase
async function addDevice(){
    const nameInput = document.getElementById('deviceName');
    const locationInput = document.getElementById('locationInput');

    const name = nameInput.value.trim();
    const location = locationInput.value.trim();

    if(!name){ alert("กรอกชื่ออุปกรณ์ก่อนครับ"); return; }

    const { data, error } = await supabase
        .from('devices')
        .insert([{ name: name, location: location }])
        .select();

    if(error) {
        alert("เกิดข้อผิดพลาดในการบันทึก: " + error.message);
    } else {
        alert("เพิ่มอุปกรณ์ลง Supabase สำเร็จแล้ว!");
        nameInput.value=""; locationInput.value="";
        loadDevices(); // รีโหลดหน้าแสดงผลใหม่
    }
}

// ฟังก์ชันลบอุปกรณ์ออกจากตาราง devices
async function deleteDevice(id){
    if(confirm("คุณต้องการลบอุปกรณ์ตัวนี้ใช่หรือไม่? (ประวัติต่างๆ จะถูกลบไปด้วย)")) {
        const { error } = await supabase
            .from('devices')
            .delete()
            .eq('id', id);

        if(error) { alert(error.message); } else { loadDevices(); }
    }
}

function toggleDevice(id){
    const btn = document.querySelector(`[data-id='${id}'] .device`);
    if(!btn) return;
    const nextState = btn.classList.contains("on") ? "off" : "on";
    setDeviceState(id, nextState);
}

// ฟังก์ชันสำหรับบันทึก Log การเปิด-ปิด ไปยังตาราง `device_status_logs`
async function setDeviceState(id, state){
    const lowerState = state.toLowerCase();
    const isStatusOn = lowerState === "on";

    // 1. บันทึกประวัติลงตาราง log ใน Supabase
    const { error } = await supabase
        .from('device_status_logs')
        .insert([{ device_id: id, status: isStatusOn }]);

    if(error) {
        console.error("บันทึกสถานะผิดพลาด:", error.message);
        return;
    }

    // 2. อัปเดต UI บนหน้าจอ
    devices.forEach(d=>{ if(d.id == id){ d.state = isStatusOn ? "ON" : "OFF"; } });
    
    const btn = document.querySelector(`[data-id='${id}'] .device`);
    if(btn){
        btn.className = "device " + lowerState;
        btn.innerText = state.toUpperCase();
    }
    console.log(`[Supabase Updated] บันทึกการเปลี่ยนสถานะ ID: ${id} เป็น ${state.toUpperCase()}`);
}

// --- ฟังก์ชันเสริม: ระบบคำสั่งเสียง (Voice Command) ---
let recognition;
function startVoice(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ voiceText.innerText ="เบราว์เซอร์ไม่รองรับระบบเสียง"; return; }

    if(recognition) { try { recognition.abort(); } catch(e) {} }

    recognition = new SpeechRecognition();
    recognition.lang = "th-TH";
    voiceText.innerText = "กำลังฟัง... พูดได้เลยครับ";
    recognition.start();

    recognition.onresult=(event)=>{
        const text = event.results[0][0].transcript.toLowerCase().trim();
        voiceText.innerText = "คุณพูดว่า: " + text;

        devices.forEach(d=>{
            const wordOn = ("เปิด" + d.name).toLowerCase();
            const wordOff = ("ปิด" + d.name).toLowerCase();

            if(text.includes(wordOn)) { setDeviceState(d.id, "on"); } 
            if(text.includes(wordOff)) { setDeviceState(d.id, "off"); }
        });
    };
    recognition.onerror=(e)=>{ voiceText.innerText = "เกิดข้อผิดพลาดในการรับเสียง"; };
}

function goPage2(){ alert("ไปหน้า dashboard.html"); }

// ทำการดึงข้อมูลจาก Supabase ทันทีที่เปิดหน้าเว็บ
loadDevices();
</script>

</body>
</html>
