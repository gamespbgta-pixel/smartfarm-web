<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Kanit',sans-serif;
background:linear-gradient(135deg,#e8f5e9,#f1f8ff);
}
.header{
background:linear-gradient(135deg,#2ecc71,#27ae60);
padding:16px 28px;
color:#fff;
font-size:20px;
font-weight:600;
position:relative;
}
.page2btn{
position:absolute;
right:20px;
top:12px;
background:#fff;
color:#27ae60;
border:none;
padding:8px 16px;
border-radius:12px;
cursor:pointer;
}
.container{
max-width:1300px;
margin:auto;
padding:30px;
}
.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:26px;
}
.card{
background:#fff;
padding:22px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:24px;
}
.device-area{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}
.slot{
border:2px dashed #cfd8dc;
border-radius:18px;
padding:14px;
min-height:230px;
text-align:center;
position:relative;
}
.slot.empty{
display:flex;
align-items:center;
justify-content:center;
color:#95a5a6;
}
.device{
width:90px;
height:90px;
border-radius:50%;
border:none;
font-size:18px;
margin:12px auto;
cursor:pointer;
}
.device.on{background:#2ecc71;color:#fff;}
.device.off{background:#e74c3c;color:#fff;}

.deleteBtn{
position:absolute;
top:8px;
right:8px;
width:30px;
height:30px;
border-radius:50%;
border:none;
background:#e74c3c;
color:#fff;
font-size:18px;
cursor:pointer;
}
input,select{
width:100%;
padding:10px;
border-radius:14px;
border:1px solid #ddd;
margin-bottom:10px;
}
.add{
width:100%;
padding:12px;
border:none;
border-radius:16px;
background:#27ae60;
color:#fff;
cursor:pointer;
}
.info{font-size:14px;margin-top:6px;}
</style>
</head>

<body>

<div class="header">
🌱 Smart Farm Control System
<button class="page2btn" onclick="goPage2()">ไปหน้า 2 →</button>
</div>

<div class="container">
<div class="main">

<div class="card">
<h3>🔌 อุปกรณ์</h3>
<div class="device-area">
<div class="slot empty">ช่องที่ 1</div>
<div class="slot empty">ช่องที่ 2</div>
<div class="slot empty">ช่องที่ 3</div>
<div class="slot empty">ช่องที่ 4</div>
<div class="slot empty">ช่องที่ 5</div>
<div class="slot empty">ช่องที่ 6</div>
<div class="slot empty">ช่องที่ 7</div>
<div class="slot empty">ช่องที่ 8</div>
</div>
</div>

<div>

<div class="card">
<h3>➕ เพิ่มอุปกรณ์</h3>
<input id="deviceName" placeholder="ชื่ออุปกรณ์">
<input id="onKey" placeholder="คำเปิด">
<input id="offKey" placeholder="คำปิด">
<input id="pinInput" placeholder="GPIO">
<button class="add" onclick="addDevice()">เพิ่ม</button>
</div>

<div class="card">
<h3>🎙️ คำสั่งเสียง</h3>
<button class="add" onclick="startVoice()">เริ่มพูด</button>
<p id="voiceText" style="font-weight: bold; color: #27ae60;">รอฟัง...</p>
</div>

<div class="card">
<h3>⏰ ตั้งเวลา</h3>
<select id="deviceSelect">
<option value="">เลือกอุปกรณ์</option>
</select>
<input type="time" id="timeOn">
<input type="time" id="timeOff">
<button class="add" onclick="saveSchedule()">บันทึก</button>
