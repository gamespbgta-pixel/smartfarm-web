<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm - Control (Supabase Integration)</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Kanit',sans-serif;
background:linear-gradient(135deg,#e8f5e9,#f1f8ff);
}
.header{
background:linear-gradient(135deg,#2ecc71,#27ae60);
padding:16px 28px;
color:#fff;
font-size:20px;
font-weight:600;
position:relative;
}
.page2btn{
position:absolute;
right:20px;
top:12px;
background:#fff;
color:#27ae60;
border:none;
padding:8px 16px;
border-radius:12px;
cursor:pointer;
font-weight: 600;
}
.container{
max-width:1300px;
margin:auto;
padding:30px;
}
.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:26px;
}
.card{
background:#fff;
padding:22px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:24px;
}
.device-area{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}
.slot{
border:2px dashed #cfd8dc;
border-radius:18px;
padding:14px;
min-height:230px;
text-align:center;
position:relative;
}
.slot.empty{
display:flex;
align-items:center;
justify-content:center;
color:#95a5a6;
}
.device{
width:90px;
height:90px;
border-radius:50%;
border:none;
font-size:18px;
margin:12px auto;
cursor:pointer;
font-weight: 600;
}
.device.on{background:#2ecc71;color:#fff;}
.device.off{background:#e74c3c;color:#fff;}

.deleteBtn{
position:absolute;
top:8px;
right:8px;
width:30px;
height:30px;
border-radius:50%;
border:none;
background:#e74c3c;
color:#fff;
font-size:18px;
cursor:pointer;
display: flex;
align-items: center;
justify-content: center;
}
input,select{
width:100%;
padding:10px;
border-radius:14px;
border:1px solid #ddd;
margin-bottom:10px;
font-family: 'Kanit', sans-serif;
}
.add{
width:100%;
padding:12px;
border:none;
border-radius:16px;
background:#27ae60;
color:#fff;
cursor:pointer;
font-family: 'Kanit', sans-serif;
font-weight: 600;
font-size: 16px;
}
.info{font-size:14px;margin-top:6px;}
</style>
</head>

<body>

<div class="header">
🌱 Smart Farm Control System (Supabase)
<button class="page2btn" onclick="goPage2()">ไปหน้าแดชบอร์ด →</button>
</div>

<div class="container">
<div class="main">

<div class="card">
<h3>🔌 อุปกรณ์</h3>
<div class="device-area" id="deviceArea">
<div class="slot empty">ช่องที่ 1</div>
<div class="slot empty">ช่องที่ 2</div>
<div class="slot empty">ช่องที่ 3</div>
<div class="slot empty">ช่องที่ 4</div>
<div class="slot empty">ช่องที่ 5</div>
<div class="slot empty">ช่องที่ 6</div>
<div class="slot empty">ช่องที่ 7</div>
<div class="slot empty">ช่องที่ 8</div>
</div>
</div>

<div>

<div class="card">
<h3>➕ เพิ่มอุปกรณ์</h3>
<input id="deviceName" placeholder="ชื่ออุปกรณ์">
<input id="onKey" placeholder="คำเปิด">
<input id="offKey" placeholder="คำปิด">
<input id="pinInput" placeholder="GPIO">
<button class="add" onclick="addDevice()">เพิ่ม</button>
</div>

<div class="card">
<h3>🎙️ คำสั่งเสียง</h3>
<button class="add" onclick="startVoice()">เริ่มพูด</button>
<p id="voiceText" style="font-weight: bold; color: #27ae60;">รอฟัง...</p>
</div>

<div class="card">
<h3>⏰ ตั้งเวลา</h3>
<select id="deviceSelect">
<option value="">เลือกอุปกรณ์</option>
</select>
<input type="time" id="timeOn">
<input type="time" id="timeOff">
<button class="add" onclick="saveSchedule()">บันทึก</button>
<p id="scheduleStatus" style="color: #27ae60; margin-top: 8px; font-weight: bold;"></p>
</div>

</div>
</div>
</div>

<script>
let ws;
let lastTriggered={};
let devices = [];

// 2. ตั้งค่า Supabase Client (เปลี่ยน URL และ Key เป็นของคุณเอง)
const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_PUBLIC_KEY";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ฟังก์ชันดึงข้อมูลจาก Supabase Table ชื่อ "devices"
async function fetchDevices() {
    try {
        const { data, error } = await supabase
            .from('devices')
            .select('*')
            .order('pin', { ascending: true });

        if (error) throw error;
        devices = data;
        renderDevices();
    } catch (err) {
        console.error("เกิดข้อผิดพลาดในการดึงข้อมูลจาก Supabase:", err.message);
    }
}

function connectWS(){
    const renderHost = "smartfarm-server-fuos.onrender.com";
    console.log("กำลังเชื่อมต่อไปยังเซิร์ฟเวอร์...");
    ws = new WebSocket("wss://" + renderHost);

    ws.onopen=()=>{
        console.log("เชื่อมต่อเซิร์ฟเวอร์สำเร็จ!");
        ws.send(JSON.stringify({ type:"web" }));
    };

    ws.onmessage=(msg)=>{
        const data=JSON.parse(msg.data);
        if(data.device){
            // รับค่าจาก WebSocket แล้วไปอัปเดตลงหน้าเว็บแบบนุ่มนวล (ไม่ต้อง fetch ใหม่ทั้งหมด)
            setDeviceState(data.device, data.status, false);
        }
    };

    ws.onclose=()=>{
        console.log("การเชื่อมต่อหลุดหาย กำลังพยายามเชื่อมต่อใหม่ใน 5 วินาที...");
        setTimeout(connectWS, 5000);
    };
    
    ws.onerror=(err)=>{ console.error("WebSocket เกิดข้อผิดพลาด: ", err); };
}

connectWS();

function renderDevices() {
    document.getElementById('deviceArea').innerHTML = `
        <div class="slot empty">ช่องที่ 1</div><div class="slot empty">ช่องที่ 2</div>
        <div class="slot empty">ช่องที่ 3</div><div class="slot empty">ช่องที่ 4</div>
        <div class="slot empty">ช่องที่ 5</div><div class="slot empty">ช่องที่ 6</div>
        <div class="slot empty">ช่องที่ 7</div><div class="slot empty">ช่องที่ 8</div>`;
    
    document.getElementById('deviceSelect').innerHTML = '<option value="">เลือกอุปกรณ์</option>';

    devices.forEach(d => {
        createDeviceUI(d);
    });
}

function createDeviceUI(d){
    const slot = document.querySelector(".slot.empty");
    if(!slot) return;

    slot.classList.remove("empty");
    slot.setAttribute("data-pin", d.pin);
    
    const cleanOn = d.on_key ? d.on_key.trim() : "";
    const cleanOff = d.off_key ? d.off_key.trim() : "";
    const cleanState = d.state ? d.state.trim().toLowerCase() : "off";

    slot.innerHTML=`
        <button class="deleteBtn" onclick="deleteDevice('${d.pin}')">✕</button>
        <h4>${d.name}</h4>
        <button class="device ${cleanState}" onclick="toggleDevice('${d.pin}')">
            ${cleanState.toUpperCase()}
        </button>
        <div class="info">GPIO: ${d.pin}</div>
        <div class="info">🎤 เปิด: ${cleanOn}</div>
        <div class="info">🎤 ปิด: ${cleanOff}</div>
        <div class="info timeInfo">
            ⏰ เปิด: ${d.time_on || "-"}<br>
            ⏰ ปิด: ${d.time_off || "-"}
        </div>
    `;

    const option=document.createElement("option");
    option.value=d.pin;
    option.textContent=d.name;
    document.getElementById('deviceSelect').appendChild(option);
}

// ฟังก์ชันเพิ่มข้อมูลลง Supabase
async function addDevice(){
    const nameInput = document.getElementById('deviceName');
    const onKeyInput = document.getElementById('onKey');
    const offKeyInput = document.getElementById('offKey');
    const pinInputElement = document.getElementById('pinInput');

    const name = nameInput.value.trim();
    const on = onKeyInput.value.trim();
    const off = offKeyInput.value.trim();
    const pin = pinInputElement.value.trim();

    if(!name||!on||!off||!pin){ alert("กรอกข้อมูลให้ครบทุกช่องก่อนกดเพิ่มครับ"); return; }
    if(devices.some(d => d.pin === pin)) { alert("GPIO นี้ถูกใช้งานไปแล้วครับ"); return; }

    try {
        const { error } = await supabase
            .from('devices')
            .insert([{ name: name, on_key: on, off_key: off, pin: pin, state: "OFF", time_on: "", time_off: "" }]);

        if (error) throw error;

        alert("เพิ่มอุปกรณ์ลงฐานข้อมูลสำเร็จ!");
        nameInput.value=""; onKeyInput.value=""; offKeyInput.value=""; pinInputElement.value="";
        
        // ดึงข้อมูลใหม่จาก Supabase มาอัปเดตหน้าจอ
        fetchDevices();
    } catch (err) {
        alert("ไม่สามารถเพิ่มอุปกรณ์ได้: " + err.message);
    }
}

// ฟังก์ชันลบข้อมูลออกจาก Supabase
async function deleteDevice(pin){
    if(confirm("คุณต้องการลบอุปกรณ์ช่องนี้ใช่หรือไม่?")) {
        try {
            const { error } = await supabase
                .from('devices')
                .delete()
                .eq('pin', pin);

            if (error) throw error;
            fetchDevices();
        } catch (err) {
            alert("ไม่สามารถลบอุปกรณ์ได้: " + err.message);
        }
    }
}

function toggleDevice(pin){
    const btn = document.querySelector(`[data-pin='${pin}'] .device`);
    if(!btn) return;
    const nextState = btn.classList.contains("on") ? "off" : "on";
    setDeviceState(pin, nextState, true);
}

// ฟังก์ชันเปลี่ยนสถานะอุปกรณ์ และอัปเดตลง Supabase
async function setDeviceState(pin, state, send=true){
    const lowerState = state.toLowerCase();
    const upperState = state.toUpperCase();

    // 1. อัปเดต UI บนหน้าจอและ Array โลคอลทันทีเพื่อความรวดเร็ว
    devices.forEach(d=>{ if(d.pin==pin){ d.state = upperState; } });
    const btn=document.querySelector(`[data-pin='${pin}'] .device`);
    if(btn){
        btn.className="device " + lowerState;
        btn.innerText = upperState;
    }

    // 2. ส่งสัญญาณหาบอร์ดผ่าน WebSocket
    if(send && ws && ws.readyState === 1){
        ws.send(JSON.stringify({
            type:"control",
            device:pin,
            status:lowerState
        }));
    }

    // 3. ทำการอัปเดตสถานะลงฐานข้อมูล Supabase
    try {
        const { error } = await supabase
            .from('devices')
            .update({ state: upperState })
            .eq('pin', pin);
        
        if (error) throw error;
        console.log(`[Supabase Updated] อุปกรณ์ Pin ${pin} -> ${upperState}`);
    } catch (err) {
        console.error("Supabase อัปเดตสถานะล้มเหลว:", err.message);
    }
}

let recognition;

function startVoice(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ voiceText.innerText ="มือถือ/เบราว์เซอร์ไม่รองรับระบบเสียง"; return; }

    if(recognition) { try { recognition.abort(); } catch(e) {} }

    recognition = new SpeechRecognition();
    recognition.lang = "th-TH";
    voiceText.innerText = "กำลังฟัง... พูดได้เลยครับ";
    recognition.start();

    recognition.onresult=(event)=>{
        const text = event.results[0][0].transcript.toLowerCase().trim();
        voiceText.innerText = "คุณพูดว่า: " + text;

        devices.forEach(d=>{
            const wordOn = d.on_key.toLowerCase().trim();
            const wordOff = d.off_key.toLowerCase().trim();

            if(text === wordOn || (wordOn.length > 2 && text.includes(wordOn))) {
                setDeviceState(d.pin, "on", true);
            } 
            if(text === wordOff || (wordOff.length > 2 && text.includes(wordOff))) {
                setDeviceState(d.pin, "off", true);
            }
        });
    };

    recognition.onerror=(e)=>{ voiceText.innerText = "เกิดข้อผิดพลาดในการรับเสียง"; };
}

// ฟังก์ชันบันทึกเวลาลง Supabase
async function saveSchedule(){
    const pin = document.getElementById('deviceSelect').value;
    const onTime = document.getElementById('timeOn').value;
    const offTime = document.getElementById('timeOff').value;
    if(!pin) { alert("โปรดเลือกอุปกรณ์ก่อนบันทึกเวลาครับ"); return; }

    try {
        const { error } = await supabase
            .from('devices')
            .update({ time_on: onTime, time_off: offTime })
            .eq('pin', pin);

        if (error) throw error;

        document.getElementById('scheduleStatus').innerText = "บันทึกเวลาลง Supabase สำเร็จ!";
        setTimeout(() => { document.getElementById('scheduleStatus').innerText = ""; }, 3000);
        
        fetchDevices();
    } catch (err) {
        alert("บันทึกเวลาล้มเหลว: " + err.message);
    }
}

// ตรวจสอบเวลาเปิด/ปิดอัตโนมัติ
setInterval(()=>{
    const now=new Date();
    const time = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");

    devices.forEach(s=>{
        const currentState = s.state ? s.state.toLowerCase() : "off";
        
        if(s.time_on == time && currentState !== "on" && lastTriggered[s.pin+"_on"] != time){
            setDeviceState(s.pin, "on", true);
            lastTriggered[s.pin+"_on"] = time;
        }
        if(s.time_off == time && currentState !== "off" && lastTriggered[s.pin+"_off"] != time){
            setDeviceState(s.pin, "off", true);
            lastTriggered[s.pin+"_off"] = time;
        }
    });
},5000);

function goPage2(){ alert("ลิ้งค์ไปที่หน้า dashboard.html"); }

// เริ่มต้นดึงข้อมูลจากฐานข้อมูล Supabase เมื่อเปิดหน้าเว็บ
fetchDevices();
</script>

</body>
</html>
