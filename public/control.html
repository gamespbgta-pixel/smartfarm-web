<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm Control</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{ margin:0; font-family:'Kanit',sans-serif; background:linear-gradient(135deg,#e8f5e9,#f1f8ff); }
.header{ background:linear-gradient(135deg,#2ecc71,#27ae60); color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; }
.header-right{ display:flex; gap:10px; }
.page2btn,.logoutbtn{ border:none; padding:10px 15px; border-radius:10px; cursor:pointer; font-family:'Kanit',sans-serif; }
.page2btn{ background:white; color:#27ae60; }
.logoutbtn{ background:#e74c3c; color:white; }
.container{ max-width:1300px; margin:auto; padding:25px; }
.main{ display:grid; grid-template-columns:2fr 1fr; gap:25px; }
.card{ background:white; border-radius:20px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,.1); margin-bottom:20px; }
.device-area{ display:grid; grid-template-columns:repeat(4,1fr); gap:15px; }
.slot{ border:2px dashed #ccc; border-radius:20px; min-height:250px; text-align:center; padding:15px; position:relative; }
.slot.empty{ display:flex; align-items:center; justify-content:center; color:#999; }
.device{ width:90px; height:90px; border-radius:50%; border:none; font-size:18px; font-weight:bold; cursor:pointer; margin:10px auto; display:block; transition: transform 0.1s ease; }
.device:active{ transform: scale(0.95); }
.device.on{ background:#2ecc71; color:white; }
.device.off{ background:#e74c3c; color:white; }
.deleteBtn{ position:absolute; top:10px; right:10px; border:none; background:red; color:white; border-radius:50%; width:30px; height:30px; cursor:pointer; }
input,select{ width:100%; padding:12px; margin-top:10px; border:1px solid #ddd; border-radius:10px; font-family:'Kanit',sans-serif; font-size:16px; }
button.action{ width:100%; background:#27ae60; color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; margin-top:12px; font-family:'Kanit',sans-serif; font-size:15px; }
.voiceBtn{ background:#3498db !important; }
.voiceBtn.listening{ background:#e67e22 !important; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
.schedule-item{ background:#f0f9f0; border:1px solid #c3e6cb; border-radius:10px; padding:10px; margin-top:8px; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
.schedule-item .del{ background:none; border:none; color:#e74c3c; cursor:pointer; font-size:16px; padding:0 5px; }
#scheduleStatus{ margin-top:8px; font-size:13px; }
#voiceText{ margin-top:8px; font-size:13px; color:#555; font-weight:600; }
#schedulerStatus{ position:fixed; bottom:15px; right:15px; background:#27ae60; color:white; padding:6px 12px; border-radius:20px; font-size:12px; font-family:'Kanit',sans-serif; opacity:0; transition:opacity 0.5s; pointer-events:none; z-index:9999; }
@media(max-width:900px){
  .main{ grid-template-columns:1fr; }
  .device-area{ grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div>
    🌱 Smart Farm Control
    <div id="user-display"></div>
  </div>
  <div class="header-right">
    <button class="page2btn" onclick="goPage2()">ประวัติ</button>
    <button class="logoutbtn" onclick="logout()">ออกจากระบบ</button>
  </div>
</div>

<div id="schedulerStatus">⏱ ตรวจสอบเวลา...</div>

<div class="container">
<div class="main">

<div>
  <div class="card">
    <h2>อุปกรณ์ทั้งหมด</h2>
    <div class="device-area" id="deviceArea">
      <div class="slot empty">ช่องที่ 1</div>
      <div class="slot empty">ช่องที่ 2</div>
      <div class="slot empty">ช่องที่ 3</div>
      <div class="slot empty">ช่องที่ 4</div>
      <div class="slot empty">ช่องที่ 5</div>
      <div class="slot empty">ช่องที่ 6</div>
      <div class="slot empty">ช่องที่ 7</div>
      <div class="slot empty">ช่องที่ 8</div>
    </div>
  </div>
</div>

<div>
  <div class="card">
    <h3>เพิ่มอุปกรณ์</h3>
    <input id="deviceName" placeholder="ชื่ออุปกรณ์">
    <input id="onKey" placeholder="คำสั่งเสียงเปิด">
    <input id="offKey" placeholder="คำสั่งเสียงปิด">
    <input id="pinInput" placeholder="GPIO">
    <button class="action" onclick="addDevice()">เพิ่มอุปกรณ์</button>
  </div>

  <div class="card">
    <h3>ตั้งเวลาอัตโนมัติ</h3>
    <select id="deviceSelect">
      <option value="">เลือกอุปกรณ์</option>
    </select>
    <label>เวลาเปิด</label>
    <input type="time" id="timeOn">
    <label>เวลาปิด</label>
    <input type="time" id="timeOff">
    <button class="action" onclick="saveSchedule()">บันทึกเวลา</button>
    <div id="scheduleStatus"></div>
    <div id="scheduleList"></div>
  </div>

  <div class="card">
    <h3>ควบคุมด้วยเสียง</h3>
    <button class="action voiceBtn" id="voiceButton" onclick="startVoice()">🎤 เริ่มฟังคำสั่ง</button>
    <div id="voiceText"></div>
  </div>
</div>

</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://zweosffxlaghnrvimdwx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let ws;
let devices = [];
let schedules = [];
let currentUser = null;
let schedulerInterval = null;
let lastScheduleAction = "";
let recognition = null;

async function checkAuthAndLoad() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { location.href = "index.html"; return; }
  currentUser = user;
  const el = document.getElementById("user-display");
  if (el) el.innerHTML = "👤 " + user.email;
  await loadDevices();
  await loadSchedules();
  startScheduler();
  connectWS();
}

async function loadDevices() {
  const { data, error } = await supabase
    .from("devices")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("created_at");
  if (error) { console.error(error); return; }
  devices = data || [];
  
  renderDevices();

  for (const d of devices) {
    const { data: logData } = await supabase
      .from("device_status_logs")
      .select("status")
      .eq("device_id", d.id)
      .order("created_at", { ascending: false })
      .limit(1);

    if (logData && logData.length > 0) {
      const lastStatus = logData[0].status;
      const btn = document.getElementById("btn-" + d.id);
      if (btn) {
        if (lastStatus === true) {
          btn.className = "device on";
          btn.innerHTML = "ON";
        } else {
          btn.className = "device off";
          btn.innerHTML = "OFF";
        }
      }
    }
  }
}

async function loadSchedules() {
  if (!devices.length) return;
  const deviceIds = devices.map(d => d.id);
  const { data, error } = await supabase
    .from("schedules")
    .select("*, devices(id, name, pin)")
    .in("device_id", deviceIds);
  if (error) { console.error(error); return; }
  schedules = data || [];
  renderScheduleList();
}

function renderDevices() {
  const area = document.getElementById("deviceArea");
  area.innerHTML = `
    <div class="slot empty">ช่องที่ 1</div>
    <div class="slot empty">ช่องที่ 2</div>
    <div class="slot empty">ช่องที่ 3</div>
    <div class="slot empty">ช่องที่ 4</div>
    <div class="slot empty">ช่องที่ 5</div>
    <div class="slot empty">ช่องที่ 6</div>
    <div class="slot empty">ช่องที่ 7</div>
    <div class="slot empty">ช่องที่ 8</div>
  `;
  document.getElementById("deviceSelect").innerHTML = '<option value="">เลือกอุปกรณ์</option>';

  devices.forEach(d => {
    const slot = document.querySelector(".slot.empty");
    if (!slot) return;
    slot.classList.remove("empty");
    slot.dataset.deviceId = d.id;
    slot.innerHTML = `
      <button class="deleteBtn" onclick="deleteDevice('${d.id}')">✕</button>
      <h3>${d.name}</h3>
      <button class="device off" id="btn-${d.id}" onclick="toggleDevice('${d.id}','${d.pin}')">OFF</button>
      <div>GPIO ${d.pin}</div>
      <div>🎤 เปิด : ${d.on_key}</div>
      <div>🎤 ปิด : ${d.off_key}</div>
    `;
    document.getElementById("deviceSelect").innerHTML +=
      `<option value="${d.id}">${d.name}</option>`;
  });
}

function renderScheduleList() {
  const list = document.getElementById("scheduleList");
  if (!list) return;
  if (!schedules.length) { list.innerHTML = ""; return; }
  list.innerHTML = '<div style="margin-top:12px;font-size:13px;color:#555;font-weight:600">รายการเวลาที่ตั้งไว้</div>';
  schedules.forEach(s => {
    const name = s.devices?.name || "ไม่ทราบชื่อ";
    list.innerHTML += `
      <div class="schedule-item">
        <span>🔧 ${name} — เปิด ${s.time_on} / ปิด ${s.time_off}</span>
        <button class="del" onclick="deleteSchedule('${s.device_id}')">🗑</button>
      </div>
    `;
  });
}

function getCurrentTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2, '0') + ':' +
         now.getMinutes().toString().padStart(2, '0');
}

async function setDeviceState(id, pin, targetState) {
  const btn = document.getElementById("btn-" + id);
  if (!btn) return;

  if (targetState === "on") {
    btn.className = "device on";
    btn.innerHTML = "ON";
  } else {
    btn.className = "device off";
    btn.innerHTML = "OFF";
  }

  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: "control", device: pin, status: targetState }));
  }

  const { error } = await supabase.from("device_status_logs").insert([{
    device_id: id,
    status: targetState === "on"
  }]);
  if (error) console.error("บันทึกประวัติไม่สำเร็จ", error);
}

window.toggleDevice = async (id, pin) => {
  const btn = document.getElementById("btn-" + id);
  if (!btn) return;
  const targetState = btn.classList.contains("on") ? "off" : "on";
  await setDeviceState(id, pin, targetState);
};

async function checkSchedules() {
  const currentTime = getCurrentTime();

  if (devices.length) {
    const deviceIds = devices.map(d => d.id);
    const { data } = await supabase
      .from("schedules")
      .select("*, devices(id, name, pin)")
      .in("device_id", deviceIds);
    if (data) schedules = data;
  }

  for (const s of schedules) {
    const device = s.devices;
    if (!device) continue;

    const timeOnClean = s.time_on ? s.time_on.substring(0, 5) : "";
    const timeOffClean = s.time_off ? s.time_off.substring(0, 5) : "";

    if (currentTime === timeOnClean && lastScheduleAction !== device.id + "_on_" + currentTime) {
      lastScheduleAction = device.id + "_on_" + currentTime;
      await setDeviceState(device.id, device.pin, "on");
      showSchedulerStatus(`⏰ เปิด ${device.name} อัตโนมัติ`);
    }

    if (currentTime === timeOffClean && lastScheduleAction !== device.id + "_off_" + currentTime) {
      lastScheduleAction = device.id + "_off_" + currentTime;
      await setDeviceState(device.id, device.pin, "off");
      showSchedulerStatus(`⏰ ปิด ${device.name} อัตโนมัติ`);
    }
  }
}

function showSchedulerStatus(msg) {
  const el = document.getElementById("schedulerStatus");
  if (el) {
    el.textContent = msg;
    el.style.opacity = "1";
    setTimeout(() => { el.style.opacity = "0"; }, 3000);
  }
}

function startScheduler() {
  checkSchedules();
  if (schedulerInterval) clearInterval(schedulerInterval);
  schedulerInterval = setInterval(() => {
    if (new Date().getSeconds() === 0) {
      checkSchedules();
    }
  }, 1000);
}

// ฟังก์ชันเสียงเวอร์ชันปรับปรุง (แก้ปัญหาเปิดไม่ได้ ปิดได้ตัวเดียว)
window.startVoice = async () => {
  const voiceBtn = document.getElementById("voiceButton");
  const voiceText = document.getElementById("voiceText");
  
  const SpeechRecognition = window.SpeechRecognition || 
                            window.webkitSpeechRecognition || 
                            window.mozSpeechRecognition || 
                            window.msSpeechRecognition;
                            
  if (!SpeechRecognition) {
    if (voiceText) voiceText.innerHTML = "❌ อุปกรณ์ของคุณไม่รองรับการสั่งงานด้วยเสียง";
    return;
  }

  if (recognition) {
    try { recognition.stop(); } catch(e){}
  }

  try {
    await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    if (voiceText) voiceText.innerHTML = "❌ กรุณาอนุญาตสิทธิ์การใช้ไมโครโฟนในโทรศัพท์";
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "th-TH";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.continuous = false; 

  recognition.onstart = () => {
    if (voiceBtn) {
      voiceBtn.classList.add("listening");
      voiceBtn.innerHTML = "🔊 กำลังฟังคำสั่งเสียง...";
    }
    if (voiceText) voiceText.innerHTML = "พูดคำสั่งเปิด/ปิดอุปกรณ์ของคุณได้เลย";
  };

  recognition.onresult = async (event) => {
    // 1. ทำความสะอาดข้อความเสียงที่จับได้ ล้างช่องว่างทิ้งให้หมด
    const text = event.results[0][0].transcript.trim().toLowerCase();
    if (voiceText) voiceText.innerHTML = `ได้ยินเสียง: "${text}"`;

    let matched = false;
    for (const d of devices) {
      // 2. เคลียร์ช่องว่างข้อความที่อยู่ในฐานข้อมูลออกให้สะอาด 
      const cleanOnKey = d.on_key.trim().toLowerCase();
      const cleanOffKey = d.off_key.trim().toLowerCase();

      // 3. ใช้การเช็กแบบตรงตัว (Exact Match) แทน .includes() ป้องกันปัญหาวิ่งชนกัน
      if (text === cleanOnKey) {
        await setDeviceState(d.id, d.pin, "on");
        matched = true;
        break; // เจอคำสั่งเปิดแล้วให้หลุดออกจากลูปทันที ป้องกันโดนคำสั่งปิดทำงานทับ
      } else if (text === cleanOffKey) {
        await setDeviceState(d.id, d.pin, "off");
        matched = true;
        break; // เจอคำสั่งปิดแล้วให้หลุดออกจากลูปทันที
      }
    }
    
    if(!matched && voiceText) {
      voiceText.innerHTML = `ได้ยิน: "${text}" (คำสั่งไม่ตรงกับอุปกรณ์ใดๆ)`;
    }
  };

  recognition.onerror = (event) => {
    console.error(event.error);
    if (voiceText) voiceText.innerHTML = "❌ เกิดข้อผิดพลาด กรุณากดลองอีกครั้ง";
  };

  recognition.onend = () => {
    if (voiceBtn) {
      voiceBtn.classList.remove("listening");
      voiceBtn.innerHTML = "🎤 เริ่มฟังคำสั่ง";
    }
  };

  recognition.start();
};

window.addDevice = async () => {
  const name = document.getElementById("deviceName").value.trim();
  const on = document.getElementById("onKey").value.trim();
  const off = document.getElementById("offKey").value.trim();
  const pin = document.getElementById("pinInput").value.trim();
  
  if (!name || !on || !off || !pin) { alert("กรอกข้อมูลให้ครบ"); return; }
  const { error } = await supabase.from("devices").insert([{
    user_id: currentUser.id,
    name, on_key: on, off_key: off, pin
  }]);
  if (error) { alert(error.message); return; }
  
  document.getElementById("deviceName").value = ""; 
  document.getElementById("onKey").value = ""; 
  document.getElementById("offKey").value = ""; 
  document.getElementById("pinInput").value = "";
  await loadDevices();
  await loadSchedules();
};

window.deleteDevice = async (id) => {
  if (!confirm("ลบอุปกรณ์นี้?")) return;
  await supabase.from("schedules").delete().eq("device_id", id);
  await supabase.from("devices").delete().eq("id", id);
  await loadDevices();
  await loadSchedules();
};

window.saveSchedule = async () => {
  const deviceId = document.getElementById("deviceSelect").value;
  const onTime = document.getElementById("timeOn").value;
  const offTime = document.getElementById("timeOff").value;
  const statusEl = document.getElementById("scheduleStatus");
  if (!deviceId || !onTime || !offTime) { alert("กรอกข้อมูลให้ครบ"); return; }

  await supabase.from("schedules").delete().eq("device_id", deviceId);

  const { error } = await supabase.from("schedules").insert([{
    device_id: deviceId,
    time_on: onTime,
    time_off: offTime
  }]);
  if (error) { alert(error.message); return; }

  if (statusEl) {
    statusEl.innerHTML = "✅ บันทึกเวลาเรียบร้อย";
    setTimeout(() => { statusEl.innerHTML = ""; }, 3000);
  }

  await loadSchedules();
  startScheduler();
};

window.deleteSchedule = async (deviceId) => {
  if (!confirm("ลบตารางเวลานี้?")) return;
  await supabase.from("schedules").delete().eq("device_id", deviceId);
  await loadSchedules();
};

function connectWS() {
  ws = new WebSocket("wss://smartfarm-web.onrender.com");
  ws.onopen = () => { ws.send(JSON.stringify({ type: "web" })); };
  ws.onclose = () => { setTimeout(connectWS, 5000); };
}

window.logout = async () => {
  if (schedulerInterval) clearInterval(schedulerInterval);
  await supabase.auth.signOut();
  location.href = "index.html";
};

window.goPage2 = () => { location.href = "history.html"; };

checkAuthAndLoad();
</script>

</body>
</html>
