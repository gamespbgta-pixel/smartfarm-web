<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm - Control (Supabase Integration)</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;600&display=swap" rel="stylesheet">

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = "https://zweosffxlaghnrvimdwx.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmZG5nanJtb3dvaXByb3R0eW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTEwODUsImV4cCI6MjA5NjkyNzA4NX0.Gk49kkH0L0Ti0LN6jEBdpDHcSfEbV4zB93v_RTr_UvI";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let devices = [];
let currentUser = null;

// ตรวจสอบสถานะการล็อกอินและโหลดข้อมูล
async function checkAuthAndLoad() {
    const { data: { user }, error } = await supabase.auth.getUser();
    
    if (error || !user) {
        alert("กรุณาเข้าสู่ระบบก่อนใช้งานหน้าควบคุม");
        window.location.href = "login.html";
        return;
    }
    
    currentUser = user;
    document.getElementById('user-display').innerText = `👤 ผู้ใช้งาน: ${user.email}`;
    loadDevices();
}

// ดึงข้อมูลอุปกรณ์เฉพาะที่เป็นของ User คนนี้
async function loadDevices() {
    if(!currentUser) return;
    console.log("กำลังโหลดข้อมูลอุปกรณ์ของคุณจาก Supabase...");
    
    const { data: dbDevices, error: devError } = await supabase
        .from('devices')
        .select('*')
        .eq('user_id', currentUser.id) // ดึงเฉพาะของตัวเอง
        .order('created_at', { ascending: true });

    if (devError) { console.error(devError); return; }
    
    devices = dbDevices || [];

    // ดึงสถานะเปิด-ปิดล่าสุดของอุปกรณ์แต่ละชิ้น
    for (let i = 0; i < devices.length; i++) {
        const { data: logData } = await supabase
            .from('device_status_logs')
            .select('status')
            .eq('device_id', devices[i].id)
            .order('changed_at', { ascending: false })
            .limit(1);
        
        devices[i].state = (logData && logData.length > 0) ? (logData[0].status ? "ON" : "OFF") : "OFF";
    }

    renderDevices();
}

function renderDevices() {
    document.getElementById('deviceArea').innerHTML = `
        <div class="slot empty">ช่องที่ 1</div><div class="slot empty">ช่องที่ 2</div>
        <div class="slot empty">ช่องที่ 3</div><div class="slot empty">ช่องที่ 4</div>
        <div class="slot empty">ช่องที่ 5</div><div class="slot empty">ช่องที่ 6</div>
        <div class="slot empty">ช่องที่ 7</div><div class="slot empty">ช่องที่ 8</div>`;

    devices.forEach(d => {
        createDeviceUI(d);
    });
}

function createDeviceUI(d){
    const slot = document.querySelector(".slot.empty");
    if(!slot) return;

    slot.classList.remove("empty");
    slot.setAttribute("data-id", d.id); 
    
    const cleanState = d.state ? d.state.toLowerCase() : "off";
    const mockOnKey = "เปิด" + d.name;
    const mockOffKey = "ปิด" + d.name;

    slot.innerHTML=`
        <button class="deleteBtn" data-id="${d.id}">✕</button>
        <h4>${d.name}</h4>
        <button class="device-toggle ${cleanState} device" data-id="${d.id}">
            ${cleanState.toUpperCase()}
        </button>
        <div class="info">สถานที่: ${d.location || "-"}</div>
        <div class="info">🎤 เปิด: ${mockOnKey}</div>
        <div class="info">🎤 ปิด: ${mockOffKey}</div>
    `;
}

// ฟังก์ชันเพิ่มอุปกรณ์พร้อมแนบรหัสเจ้าของ (user_id)
async function addDevice(){
    if(!currentUser) return;
    const nameInput = document.getElementById('deviceName');
    const locationInput = document.getElementById('locationInput');

    const name = nameInput.value.trim();
    const location = locationInput.value.trim();

    if(!name){ alert("กรอกชื่ออุปกรณ์ก่อนครับ"); return; }

    const { data, error } = await supabase
        .from('devices')
        .insert([{ 
            name: name, 
            location: location,
            user_id: currentUser.id // แนบรหัส User ไปยังฐานข้อมูล
        }])
        .select();

    if(error) {
        alert("เกิดข้อผิดพลาดในการบันทึก: " + error.message);
    } else {
        alert("เพิ่มอุปกรณ์สำเร็จ!");
        nameInput.value=""; locationInput.value="";
        loadDevices(); 
    }
}

// ฟังก์ชันลบอุปกรณ์
async function deleteDevice(id){
    if(confirm("คุณต้องการลบอุปกรณ์ตัวนี้ใช่หรือไม่?")) {
        const { error } = await supabase
            .from('devices')
            .delete()
            .eq('id', id);

        if(error) { alert(error.message); } else { loadDevices(); }
    }
}

// ฟังก์ชันเปิด-ปิดการทำงาน
async function setDeviceState(id, state){
    const lowerState = state.toLowerCase();
    const isStatusOn = lowerState === "on";

    const { error } = await supabase
        .from('device_status_logs')
        .insert([{ device_id: id, status: isStatusOn }]);

    if(error) {
        console.error("บันทึกสถานะผิดพลาด:", error.message);
        return;
    }

    devices.forEach(d=>{ if(d.id == id){ d.state = isStatusOn ? "ON" : "OFF"; } });
    
    const btn = document.querySelector(`button.device[data-id='${id}']`);
    if(btn){
        btn.className = "device " + lowerState;
        btn.innerText = state.toUpperCase();
    }
}

// ระบบคำสั่งเสียง (Voice) 
let recognition;
function startVoice(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ document.getElementById("voiceText").innerText ="เบราว์เซอร์ไม่รองรับ"; return; }

    if(recognition) { try { recognition.abort(); } catch(e) {} }

    recognition = new SpeechRecognition();
    recognition.lang = "th-TH";
    document.getElementById("voiceText").innerText = "กำลังฟัง... พูดได้เลยครับ";
    recognition.start();

    recognition.onresult=(event)=>{
        const text = event.results[0][0].transcript.toLowerCase().trim();
        document.getElementById("voiceText").innerText = "คุณพูดว่า: " + text;

        devices.forEach(d=>{
            const wordOn = ("เปิด" + d.name).toLowerCase();
            const wordOff = ("ปิด" + d.name).toLowerCase();

            if(text.includes(wordOn)) { setDeviceState(d.id, "on"); } 
            if(text.includes(wordOff)) { setDeviceState(d.id, "off"); }
        });
    };
}

// ฟังก์ชันออกจากระบบ
async function logout() {
    await supabase.auth.signOut();
    window.location.href = "login.html";
}

// ผูกฟังก์ชันเข้ากับปุ่มต่างๆ บนหน้าจอแบบ Dynamic (เนื่องจากใช้ `<script type="module">`)
window.addDevice = addDevice;
window.startVoice = startVoice;
window.logout = logout;
window.goPage2 = () => { alert("ไปหน้าแดชบอร์ดสรุปผลอุณหภูมิ/ระดับน้ำ"); };

// มอบหมาย Event Click ให้กับปุ่มภายใน Slot อุปกรณ์
document.addEventListener('click', function(e) {
    if(e.target && e.target.classList.contains('deleteBtn')) {
        deleteDevice(e.target.getAttribute('data-id'));
    }
    if(e.target && e.target.classList.contains('device-toggle')) {
        const id = e.target.getAttribute('data-id');
        const nextState = e.target.classList.contains("on") ? "off" : "on";
        setDeviceState(id, nextState);
    }
});

// เริ่มต้นเช็คสิทธิ์ล็อกอินทันทีเมื่อหน้าเว็บพร้อมทำงาน
checkAuthAndLoad();
</script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Kanit',sans-serif;
background:linear-gradient(135deg,#e8f5e9,#f1f8ff);
}
.header{
background:linear-gradient(135deg,#2ecc71,#27ae60);
padding:16px 28px;
color:#fff;
font-size:20px;
font-weight:600;
position:relative;
display: flex;
justify-content: space-between;
align-items: center;
}
.header-right {
display: flex;
gap: 12px;
align-items: center;
}
.page2btn, .logoutbtn{
background:#fff;
color:#27ae60;
border:none;
padding:8px 16px;
border-radius:12px;
cursor:pointer;
font-weight: 600;
font-family:'Kanit',sans-serif;
}
.logoutbtn {
background: #e74c3c;
color: white;
}
.container{
max-width:1300px;
margin:auto;
padding:30px;
}
.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:26px;
}
.card{
background:#fff;
padding:22px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:24px;
}
.device-area{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}
.slot{
border:2px dashed #cfd8dc;
border-radius:18px;
padding:14px;
min-height:230px;
text-align:center;
position:relative;
}
.slot.empty{
display:flex;
align-items:center;
justify-content:center;
color:#95a5a6;
}
.device{
width:90px;
height:90px;
border-radius:50%;
border:none;
font-size:18px;
margin:12px auto;
cursor:pointer;
font-weight: 600;
display: block;
}
.device.on{background:#2ecc71;color:#fff;}
.device.off{background:#e74c3c;color:#fff;}

.deleteBtn{
position:absolute;
top:8px;
right:8px;
width:30px;
height:30px;
border-radius:50%;
border:none;
background:#e74c3c;
color:#fff;
font-size:18px;
cursor:pointer;
display: flex;
align-items: center;
justify-content: center;
}
input,select{
width:100%;
padding:10px;
border-radius:14px;
border:1px solid #ddd;
margin-bottom:10px;
font-family: 'Kanit', sans-serif;
}
.add{
width:100%;
padding:12px;
border:none;
border-radius:16px;
background:#27ae60;
color:#fff;
cursor:pointer;
font-family: 'Kanit', sans-serif;
font-weight: 600;
font-size: 16px;
}
.info{font-size:14px;margin-top:6px;}
#user-display { font-size: 14px; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 8px;}
</style>
</head>

<body>

<div class="header">
<div>🌱 Smart Farm Control System (Supabase)</div>
<div class="header-right">
    <span id="user-display">กำลังยืนยันตัวตน...</span>
    <button class="page2btn" onclick="goPage2()">ไปหน้าแดชบอร์ด →</button>
    <button class="logoutbtn" onclick="logout()">ออกจากระบบ</button>
</div>
</div>

<div class="container">
<div class="main">

<div class="card">
<h3>🔌 อุปกรณ์ของคุณ</h3>
<div class="device-area" id="deviceArea">
<div class="slot empty">ช่องที่ 1</div>
<div class="slot empty">ช่องที่ 2</div>
<div class="slot empty">ช่องที่ 3</div>
<div class="slot empty">ช่องที่ 4</div>
<div class="slot empty">ช่องที่ 5</div>
<div class="slot empty">ช่องที่ 6</div>
<div class="slot empty">ช่องที่ 7</div>
<div class="slot empty">ช่องที่ 8</div>
</div>
</div>

<div>

<div class="card">
<h3>➕ เพิ่มอุปกรณ์ใหม่</h3>
<input id="deviceName" placeholder="ชื่ออุปกรณ์ เช่น ปั๊มน้ำ, พัดลม">
<input id="locationInput" placeholder="สถานที่ติดตั้ง เช่น โรงเรือนที่ 1">
<button class="add" onclick="addDevice()">เพิ่มเข้าฐานข้อมูล</button>
</div>

<div class="card">
<h3>🎙️ คำสั่งเสียง</h3>
<button class="add" onclick="startVoice()">เริ่มพูด</button>
<p id="voiceText" style="font-weight: bold; color: #27ae60;">รอฟัง...</p>
</div>

</div>
</div>
</div>

</body>
</html>
