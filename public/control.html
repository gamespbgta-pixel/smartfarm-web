<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm Control</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Kanit',sans-serif;
    background:linear-gradient(135deg,#e8f5e9,#f1f8ff);
}

.header{
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-right{
    display:flex;
    gap:10px;
}

.page2btn,.logoutbtn{
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-family:'Kanit',sans-serif;
}

.page2btn{
    background:white;
    color:#27ae60;
}

.logoutbtn{
    background:#e74c3c;
    color:white;
}

.container{
    max-width:1300px;
    margin:auto;
    padding:25px;
}

.main{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    margin-bottom:20px;
}

.device-area{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.slot{
    border:2px dashed #ccc;
    border-radius:20px;
    min-height:250px;
    text-align:center;
    padding:15px;
    position:relative;
}

.slot.empty{
    display:flex;
    align-items:center;
    justify-content:center;
    color:#999;
}

.device{
    width:90px;
    height:90px;
    border-radius:50%;
    border:none;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin:10px auto;
}

.device.on{
    background:#2ecc71;
    color:white;
}

.device.off{
    background:#e74c3c;
    color:white;
}

.deleteBtn{
    position:absolute;
    top:10px;
    right:10px;
    border:none;
    background:red;
    color:white;
    border-radius:50%;
    width:30px;
    height:30px;
    cursor:pointer;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:10px;
}

button.action{
    width:100%;
    background:#27ae60;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    margin-top:12px;
}

.voiceBtn{
    background:#3498db !important;
}

@media(max-width:900px){
    .main{
        grid-template-columns:1fr;
    }

    .device-area{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>
<body>

<div class="header">
    <div>
        🌱 Smart Farm Control
        <div id="user-display"></div>
    </div>

    <div class="header-right">
        <button class="page2btn" onclick="goPage2()">ประวัติ</button>
        <button class="logoutbtn" onclick="logout()">ออกจากระบบ</button>
    </div>
</div>

<div class="container">

<div class="main">

<!-- ฝั่งซ้าย -->
<div>

<div class="card">
<h2>อุปกรณ์ทั้งหมด</h2>

<div class="device-area" id="deviceArea">

<div class="slot empty">ช่องที่ 1</div>
<div class="slot empty">ช่องที่ 2</div>
<div class="slot empty">ช่องที่ 3</div>
<div class="slot empty">ช่องที่ 4</div>
<div class="slot empty">ช่องที่ 5</div>
<div class="slot empty">ช่องที่ 6</div>
<div class="slot empty">ช่องที่ 7</div>
<div class="slot empty">ช่องที่ 8</div>

</div>
</div>

</div>

<!-- ฝั่งขวา -->
<div>

<div class="card">

<h3>เพิ่มอุปกรณ์</h3>

<input id="deviceName" placeholder="ชื่ออุปกรณ์">

<input id="onKey" placeholder="คำสั่งเสียงเปิด">

<input id="offKey" placeholder="คำสั่งเสียงปิด">

<input id="pinInput" placeholder="GPIO">

<button class="action" onclick="addDevice()">
เพิ่มอุปกรณ์
</button>

</div>

<div class="card">

<h3>ตั้งเวลาอัตโนมัติ</h3>

<select id="deviceSelect">
<option value="">เลือกอุปกรณ์</option>
</select>

<label>เวลาเปิด</label>
<input type="time" id="timeOn">

<label>เวลาปิด</label>
<input type="time" id="timeOff">

<button class="action" onclick="saveSchedule()">
บันทึกเวลา
</button>

<div id="scheduleStatus"></div>

</div>

<div class="card">

<h3>ควบคุมด้วยเสียง</h3>

<button class="action voiceBtn" onclick="startVoice()">
🎤 เริ่มฟังคำสั่ง
</button>

<div id="voiceText"></div>

</div>

</div>

</div>

</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://zweosffxlaghnrvimdwx.supabase.co";
const SUPABASE_ANON_KEY = "ใส่ ANON KEY ของคุณ";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let ws;
let devices = [];
let currentUser = null;
let recognition;

// ตรวจสอบการล็อกอิน
async function checkAuthAndLoad(){
    const {data:{user}} = await supabase.auth.getUser();

    if(!user){
        location.href="login.html";
        return;
    }

    currentUser=user;

    const userDisplay=document.getElementById("user-display");
    if(userDisplay){
        userDisplay.innerHTML="👤 "+user.email;
    }

    loadDevices();
    connectWS();
}

// โหลดอุปกรณ์
async function loadDevices(){

    const {data,error}=await supabase
    .from("devices")
    .select("*")
    .eq("user_id",currentUser.id)
    .order("created_at");

    if(error){
        console.log(error);
        return;
    }

    devices=data || [];

    renderDevices();
}

// แสดงอุปกรณ์
function renderDevices(){

    const area=document.getElementById("deviceArea");

    area.innerHTML=`
    <div class="slot empty">ช่องที่ 1</div>
    <div class="slot empty">ช่องที่ 2</div>
    <div class="slot empty">ช่องที่ 3</div>
    <div class="slot empty">ช่องที่ 4</div>
    <div class="slot empty">ช่องที่ 5</div>
    <div class="slot empty">ช่องที่ 6</div>
    <div class="slot empty">ช่องที่ 7</div>
    <div class="slot empty">ช่องที่ 8</div>
    `;

    document.getElementById("deviceSelect").innerHTML=
    '<option value="">เลือกอุปกรณ์</option>';

    devices.forEach(d=>{

        const slot=document.querySelector(".slot.empty");

        if(!slot) return;

        slot.classList.remove("empty");

        slot.innerHTML=`
        <button class="deleteBtn" onclick="deleteDevice('${d.id}')">✕</button>

        <h3>${d.name}</h3>

        <button class="device off"
        onclick="toggleDevice('${d.id}','${d.pin}',this)">
        OFF
        </button>

        <div>GPIO ${d.pin}</div>
        <div>🎤 เปิด : ${d.on_key}</div>
        <div>🎤 ปิด : ${d.off_key}</div>
        `;

        deviceSelect.innerHTML+=
        `<option value="${d.id}">${d.name}</option>`;
    });
}

// เพิ่มอุปกรณ์
window.addDevice=async()=>{

    const name=deviceName.value.trim();
    const on=onKey.value.trim();
    const off=offKey.value.trim();
    const pin=pinInput.value.trim();

    if(!name||!on||!off||!pin){
        alert("กรอกข้อมูลให้ครบ");
        return;
    }

    const {error}=await supabase
    .from("devices")
    .insert([{
        user_id:currentUser.id,
        name:name,
        on_key:on,
        off_key:off,
        pin:pin
    }]);

    if(error){
        alert(error.message);
        return;
    }

    loadDevices();
};

// เปิดปิดอุปกรณ์
window.toggleDevice=(id,pin,btn)=>{

    let state="on";

    if(btn.classList.contains("on")){
        state="off";
        btn.className="device off";
        btn.innerHTML="OFF";
    }
    else{
        btn.className="device on";
        btn.innerHTML="ON";
    }

    if(ws && ws.readyState===1){

        ws.send(JSON.stringify({
            type:"control",
            device:pin,
            status:state
        }));

    }

};

// ลบอุปกรณ์
window.deleteDevice=async(id)=>{

    if(!confirm("ลบอุปกรณ์ ?")) return;

    await supabase
    .from("devices")
    .delete()
    .eq("id",id);

    loadDevices();

};

// WebSocket
function connectWS(){

    ws=new WebSocket(
    "wss://smartfarm-web.onrender.com"
    );

    ws.onopen=()=>{
        ws.send(JSON.stringify({
            type:"web"
        }));
    };

    ws.onclose=()=>{
        setTimeout(connectWS,5000);
    };

}

// Voice
window.startVoice=()=>{

const SpeechRecognition=
window.SpeechRecognition||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
voiceText.innerHTML="เบราว์เซอร์ไม่รองรับ";
return;
}

recognition=new SpeechRecognition();

recognition.lang="th-TH";

voiceText.innerHTML="กำลังฟัง...";

recognition.start();

recognition.onresult=(event)=>{

const text=
event.results[0][0].transcript
.toLowerCase();

voiceText.innerHTML=text;

};

};

// Schedule
window.saveSchedule=()=>{
alert("บันทึกเวลาเรียบร้อย");
};

// Logout
window.logout=async()=>{

await supabase.auth.signOut();

location.href="login.html";

};

window.goPage2=()=>{
location.href="history.html";
};

checkAuthAndLoad();

</script>

</body>
</html>
