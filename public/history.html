<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกและสถิติ Smart Farm ไฮบริดเรียลไทม์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{ box-sizing:border-box; }
body{ margin:0; font-family:'Kanit',sans-serif; background:linear-gradient(135deg,#e8f5e9,#f1f8ff); }
.container{ max-width:1200px; margin:auto; padding:25px; }
.card{ background:white; border-radius:20px; padding:25px; box-shadow:0 10px 25px rgba(0,0,0,.1); margin-bottom: 25px; }
.top-bar{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; margin-bottom:20px; }
h1{ margin:0; color:#27ae60; }
h2{ margin-top:0; color:#2c3e50; border-bottom:2px solid #e8f5e9; padding-bottom:10px; font-size:20px; }
.backBtn{ border:none; background:#27ae60; color:white; padding:12px 20px; border-radius:12px; font-family:'Kanit',sans-serif; font-size:16px; cursor:pointer; transition:background 0.2s; }
.backBtn:hover{ background:#219150; }
.calendar-section { background:#f9fbf9; border:2px solid #27ae60; border-radius:16px; padding:20px; margin-bottom:5px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:15px; }
.calendar-wrapper { display:flex; align-items:center; gap:10px; }
.calendar-wrapper label { font-weight:600; color:#2c3e50; }
.calendar-section input[type="date"] { padding:10px 15px; border:2px solid #cbd5e1; border-radius:10px; font-family:'Kanit',sans-serif; font-size:16px; outline:none; }
.calendar-section input[type="date"]:focus { border-color:#27ae60; }
.date-summary { font-size:16px; font-weight:600; color:#27ae60; background:#e8f5e9; padding:8px 16px; border-radius:20px; }
.badge { font-size:14px; padding:4px 10px; border-radius:8px; margin-left:10px; font-weight:bold; }
.badge-realtime { background:#e74c3c; color:white; animation: blink 1.5s infinite; }
.badge-history { background:#7f8c8d; color:white; }
@keyframes blink { 0% {opacity:1;} 50% {opacity:0.4;} 100% {opacity:1;} }

/* โซนที่จัดสัดส่วนเพิ่มเข้ามาสำหรับหน้าจอกราฟวงกลมคู่ */
.pie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
.pie-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,.1); text-align: center; }
.pie-container { position: relative; width: 160px; height: 160px; margin: 0 auto; }
.pie-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 26px; font-weight: bold; }

.chart-container { position:relative; height:350px; width:100%; margin-top:15px; }
.no-data { text-align:center; color:#999; padding:40px; font-size:16px; }
.searchBox { margin-bottom:20px; }
.searchBox input { width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:12px; font-family:'Kanit',sans-serif; font-size:16px; outline:none; }
.searchBox input:focus { border-color:#27ae60; box-shadow:0 0 0 3px rgba(39, 174, 96, 0.1); }
table { width:100%; border-collapse:collapse; }
th { background:linear-gradient(135deg,#2ecc71,#27ae60); color:white; padding:15px; }
td { padding:15px; text-align:center; border-bottom:1px solid #eee; }
tr:hover { background:#f5fff7; }
.on { color:#2ecc71; font-weight:bold; }
.off { color:#e74c3c; font-weight:bold; }
.empty { color:#999; padding:40px; font-size:18px; }
@media(max-width:768px){ 
  .top-bar, .calendar-section { flex-direction:column; align-items:stretch; } 
  .backBtn { text-align:center; } 
  .pie-grid { grid-template-columns: 1fr; } /* ยุบกราฟวงกลมคู่เหลือแถวเดี่ยวเมื่อจอมือถือเล็ก */
}
</style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="top-bar">
            <h1>📜 บันทึกและสถิติ Smart Farm</h1>
            <button class="backBtn" id="backBtn">🏠 กลับไปหน้าควบคุม</button>
        </div>

        <div class="calendar-section">
            <div class="calendar-wrapper">
                <label for="datePicker">📅 เลือกวันที่ตรวจสอบ:</label>
                <input type="date" id="datePicker">
                <span id="statusBadge" class="badge">กำลังตรวจสอบ...</span>
            </div>
            <div class="date-summary" id="dateSummary">พบข้อมูลประวัติ 0 รายการ</div>
        </div>
    </div>

    <div class="pie-grid" id="pieWrapper">
        <div class="pie-card">
            <h3 style="margin: 0 0 15px 0; color: #f39c12;">🌾 ระดับอาหารคงเหลือ</h3>
            <div class="pie-container">
                <canvas id="foodPieChart"></canvas>
                <div id="foodPercentText" class="pie-text" style="color: #f39c12;">-%</div>
            </div>
        </div>
        <div class="pie-card">
            <h3 style="margin: 0 0 15px 0; color: #3498db;">💧 ระดับน้ำคงเหลือ</h3>
            <div class="pie-container">
                <canvas id="waterPieChart"></canvas>
                <div id="waterPercentText" class="pie-text" style="color: #3498db;">-%</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>📊 กราฟสรุปสภาพแวดล้อม (อุณหภูมิ)</h2>
        <div id="chartWrapper">
            <div class="chart-container">
                <canvas id="farmChart"></canvas>
            </div>
        </div>
        <div id="noDataMessage" class="no-data" style="display:none;">📅 ไม่มีข้อมูลสถิติเซนเซอร์ในวันที่เลือก</div>
    </div>

    <div class="card">
        <h2>⏱️ บันทึกการเปิด-ปิด อุปกรณ์</h2>
        <div class="searchBox">
            <input type="text" id="searchInput" placeholder="🔍 ค้นหาด้วยชื่ออุปกรณ์...">
        </div>

        <table>
            <thead>
                <tr>
                    <th>เวลา</th>
                    <th>อุปกรณ์</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                <tr><td colspan="3" class="empty">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://zweosffxlaghnrvimdwx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let historyData = [];
let farmChart = null;
let foodPieChart = null; // ตัวแปรเก็บกราฟวงกลมอาหาร
let waterPieChart = null; // ตัวแปรเก็บกราฟวงกลมน้ำ
let realtimeChannel = null; 

const datePicker = document.getElementById("datePicker");
const statusBadge = document.getElementById("statusBadge");

const todayStr = new Date().toLocaleDateString('sv'); 
datePicker.value = todayStr;

document.getElementById("backBtn").addEventListener("click", () => { location.href = "control.html"; });

async function loadHistory() {
    const { data, error } = await supabase.from("device_status_logs").select(`device_id, status, changed_at, devices(name)`);
    if (!error) {
        historyData = data || [];
        historyData.sort((a, b) => new Date(b.changed_at) - new Date(a.changed_at));
        filterAndRenderTable();
    }
}

async function loadMetrics() {
    const selectedDate = datePicker.value;
    if (!selectedDate) return;

    const startOfDay = `${selectedDate}T00:00:00+07:00`;
    const endOfDay = `${selectedDate}T23:59:59+07:00`;

    const { data, error } = await supabase
        .from("sensor_logs")
        .select("recorded_at, temperature, water_level, food_level")
        .gte("recorded_at", startOfDay)
        .lte("recorded_at", endOfDay)
        .order("recorded_at", { ascending: true });

    if (error) {
        console.error("ดึงข้อมูลสถิติผิดพลาด:", error);
        return;
    }

    if (!data || data.length === 0) {
        document.getElementById("chartWrapper").style.display = "none";
        document.getElementById("pieWrapper").style.display = "none"; // ซ่อนกล่องวงกลมถ้าไม่มีข้อมูลวันนั้น
        document.getElementById("noDataMessage").style.display = "block";
        return;
    }

    document.getElementById("chartWrapper").style.display = "block";
    document.getElementById("pieWrapper").style.display = "grid"; // เปิดแสดงกล่องวงกลมคู่ปกติ
    document.getElementById("noDataMessage").style.display = "none";

    const labels = data.map(item => new Date(item.recorded_at).toLocaleTimeString("th-TH", { hour: '2-digit', minute: '2-digit' }));
    const tempData = data.map(item => item.temperature);
    
    // ดึงเอาข้อมูลแถวล่าสุด (ตัวท้ายสุดของชุดข้อมูลวันที่เลือก) มาสตรีมวาดวงกลมเปอร์เซ็นต์
    const latestRow = data[data.length - 1];
    
    // สั่งวาด/อัปเดตกราฟเส้นอุณหภูมิเดี่ยว
    updateLineChart(labels, tempData);
    
    // สั่งวาด/อัปเดตกราฟวงกลมเปอร์เซ็นต์อาหารกับน้ำแยกก้อน
    updatePieCharts(latestRow.food_level, latestRow.water_level);
}

function manageRealtimeSubscription() {
    const selectedDate = datePicker.value;
    const currentToday = new Date().toLocaleDateString('sv');

    if (selectedDate === currentToday) {
        statusBadge.textContent = "🔴 LIVE เรียลไทม์";
        statusBadge.className = "badge badge-realtime";

        if (!realtimeChannel) {
            realtimeChannel = supabase
                .channel('farm-hybrid-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sensor_logs' }, () => {
                    loadMetrics(); 
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'device_status_logs' }, async () => {
                    await loadHistory(); 
                })
                .subscribe();
        }
    } else {
        statusBadge.textContent = "📅 ข้อมูลย้อนหลัง";
        statusBadge.className = "badge badge-history";
        
        if (realtimeChannel) {
            supabase.removeChannel(realtimeChannel);
            realtimeChannel = null;
        }
    }
}

// 💡 ปรับโค้ดฟังก์ชันกราฟเดิม ให้วาดเฉพาะ "อุณหภูมิ" เพื่อความสะอาดสายตา
function updateLineChart(labels, tempData) {
    const ctx = document.getElementById('farmChart').getContext('2d');
    if (farmChart) { farmChart.destroy(); }

    farmChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: '🌡️ อุณหภูมิ (°C)', data: tempData, borderColor: '#e74c3c', backgroundColor: 'rgba(231, 76, 60, 0.05)', yAxisID: 'yTemp', tension: 0.2 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                yTemp: { type: 'linear', position: 'left', title: { display: true, text: 'อุณหภูมิ (°C)' } }
            }
        }
    });
}

// 💡 เพิ่มฟังก์ชันสำหรับวาดและบริหารจัดการอัปเดตแกนกราฟวงกลม (อาหาร/น้ำ) ล่าสุด
function updatePieCharts(foodLevel, waterLevel) {
    // ปิดล้อมจำกัดขอบเขตค่าเพื่อความชัวร์ไม่เกิน 0-100%
    const foodVal = foodLevel < 0 ? 0 : (foodLevel > 100 ? 100 : foodLevel);
    const waterVal = waterLevel < 0 ? 0 : (waterLevel > 100 ? 100 : waterLevel);

    // ฝังข้อความตัวเลขกลางวงแหวน
    document.getElementById("foodPercentText").textContent = foodVal + "%";
    document.getElementById("waterPercentText").textContent = waterVal + "%";

    // 1. วาด/อัปเดต วงแหวนอาหาร
    if (foodPieChart) {
        foodPieChart.data.datasets[0].data = [foodVal, 100 - foodVal];
        foodPieChart.update();
    } else {
        const ctxFood = document.getElementById('foodPieChart').getContext('2d');
        foodPieChart = new Chart(ctxFood, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [foodVal, 100 - foodVal],
                    backgroundColor: ['#f39c12', '#f39c1220'],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '80%',
                plugins: { tooltip: { enabled: false }, legend: { display: false } },
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }

    // 2. วาด/อัปเดต วงแหวนน้ำ
    if (waterPieChart) {
        waterPieChart.data.datasets[0].data = [waterVal, 100 - waterVal];
        waterPieChart.update();
    } else {
        const ctxWater = document.getElementById('waterPieChart').getContext('2d');
        waterPieChart = new Chart(ctxWater, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [waterVal, 100 - waterVal],
                    backgroundColor: ['#3498db', '#3498db20'],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '80%',
                plugins: { tooltip: { enabled: false }, legend: { display: false } },
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }
}

function filterAndRenderTable() {
    const selectedDate = datePicker.value;
    const keyword = document.getElementById("searchInput").value.toLowerCase();
    if (!selectedDate) return;

    const filtered = historyData.filter(item => {
        if (!item.changed_at) return false;
        const logDate = new Date(item.changed_at);
        const itemDateString = `${logDate.getFullYear()}-${String(logDate.getMonth() + 1).padStart(2, '0')}-${String(logDate.getDate()).padStart(2, '0')}`;
        
        const matchesDate = (itemDateString === selectedDate);
        const name = (item.devices?.name || "").toLowerCase();
        const statusText = item.status ? "เปิด" : "ปิด";
        return matchesDate && (name.includes(keyword) || statusText.includes(keyword));
    });

    renderTable(filtered);
    document.getElementById("dateSummary").textContent = `พบข้อมูลประวัติทั้งหมด ${filtered.length} รายการ`;
}

function renderTable(data) {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";
    if (data.length === 0) {
        table.innerHTML = `<tr><td colspan="3" class="empty">📅 ไม่มีข้อมูลในวันที่เลือก</td></tr>`;
        return;
    }
    data.forEach(item => {
        table.innerHTML += `
            <tr>
                <td>${new Date(item.changed_at).toLocaleString("th-TH")}</td>
                <td>${item.devices?.name || "-"}</td>
                <td class="${item.status ? 'on' : 'off'}">${item.status ? '🟢 เปิด' : '🔴 ปิด'}</td>
            </tr>`;
    });
}

datePicker.addEventListener("change", () => {
    filterAndRenderTable();
    loadMetrics();
    manageRealtimeSubscription(); 
});

document.getElementById("searchInput").addEventListener("input", filterAndRenderTable);

async function init() {
    await loadHistory();
    await loadMetrics();
    manageRealtimeSubscription(); 
}
init();
</script>

</body>
</html>
