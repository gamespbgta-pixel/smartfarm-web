<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการทำงานและสถิติ Smart Farm (รายวัน)</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Kanit',sans-serif;
    background:linear-gradient(135deg,#e8f5e9,#f1f8ff);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:25px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    margin-bottom: 25px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:20px;
}

h1{
    margin:0;
    color:#27ae60;
}

h2{
    margin-top:0;
    color:#2c3e50;
    border-bottom: 2px solid #e8f5e9;
    padding-bottom: 10px;
}

.backBtn{
    border:none;
    background:#27ae60;
    color:white;
    padding:12px 20px;
    border-radius:12px;
    font-family:'Kanit',sans-serif;
    font-size:16px;
    cursor:pointer;
    transition: background 0.2s;
}

.backBtn:hover{
    background:#219150;
}

/* ส่วนเลือกวันที่สไตล์ปฏิทิน */
.calendar-section {
    background: #f9fbf9;
    border: 2px solid #27ae60;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 15px;
}

.calendar-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
}

.calendar-wrapper label {
    font-weight: 600;
    color: #2c3e50;
}

.calendar-section input[type="date"] {
    padding: 10px 15px;
    border: 2px solid #cbd5e1;
    border-radius: 10px;
    font-family: 'Kanit', sans-serif;
    font-size: 16px;
    outline: none;
    color: #333;
    background: white;
}

.calendar-section input[type="date"]:focus {
    border-color: #27ae60;
}

.date-summary {
    font-size: 16px;
    font-weight: 600;
    color: #27ae60;
    background: #e8f5e9;
    padding: 8px 16px;
    border-radius: 20px;
}

/* ส่วนการแสดงผลกราฟ */
.chart-container {
    position: relative;
    height: 350px;
    width: 100%;
    margin-top: 15px;
}

.no-data {
    text-align: center;
    color: #999;
    padding: 40px;
    font-size: 16px;
}

.searchBox {
    margin-bottom: 20px;
}

.searchBox input {
    width: 100%;
    padding: 14px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    font-family: 'Kanit', sans-serif;
    font-size: 16px;
    outline: none;
}

.searchBox input:focus {
    border-color: #27ae60;
    box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: linear-gradient(135deg,#2ecc71,#27ae60);
    color: white;
    padding: 15px;
}

td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f5fff7;
}

.on {
    color: #2ecc71;
    font-weight: bold;
}

.off {
    color: #e74c3c;
    font-weight: bold;
}

.empty {
    color: #999;
    padding: 40px;
    font-size: 18px;
}

@media(max-width:768px){
    .top-bar, .calendar-section {
        flex-direction: column;
        align-items: stretch;
    }
    .backBtn {
        width: 100%;
        text-align: center;
    }
    table {
        font-size: 14px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="top-bar">
            <h1>📜 ศูนย์บันทึกข้อมูล Smart Farm</h1>
            <button class="backBtn" id="backBtn">🏠 กลับไปหน้าควบคุม</button>
        </div>

        <div class="calendar-section">
            <div class="calendar-wrapper">
                <label for="datePicker">📅 เลือกวันที่ต้องการตรวจสอบข้อมูล:</label>
                <input type="date" id="datePicker">
            </div>
            <div class="date-summary" id="dateSummary">พบข้อมูลประวัติ 0 รายการ</div>
        </div>
    </div>

    <div class="card">
        <h2>📊 กราฟสรุปสภาพแวดล้อม (อุณหภูมิ, อาหาร, น้ำ)</h2>
        <div id="chartWrapper">
            <div class="chart-container">
                <canvas id="farmChart"></canvas>
            </div>
        </div>
        <div id="noDataMessage" class="no-data" style="display:none;">📅 ไม่มีบันทึกสถิติอุณหภูมิ อาหาร หรือน้ำในวันที่เลือก</div>
    </div>

    <div class="card">
        <h2>⏱️ บันทึกการเปิด-ปิด อุปกรณ์</h2>
        <div class="searchBox">
            <input type="text" id="searchInput" placeholder="🔍 ค้นหาซ้ำด้วยชื่ออุปกรณ์ภายในวันนั้น...">
        </div>

        <table>
            <thead>
                <tr>
                    <th>เวลา</th>
                    <th>อุปกรณ์</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                <tr>
                    <td colspan="3" class="empty">กำลังโหลดข้อมูลประวัติ...</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://zweosffxlaghnrvimdwx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let historyData = [];
let farmChart = null;

// ตั้งค่าวันที่เริ่มต้นในปฏิทินให้เป็น "วันนี้"
const datePicker = document.getElementById("datePicker");
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth() + 1).padStart(2, '0');
const dd = String(today.getDate()).padStart(2, '0');
datePicker.value = `${yyyy}-${mm}-${dd}`;

// ปุ่มกลับหน้าควบคุม
document.getElementById("backBtn").addEventListener("click", () => {
    location.href = "control.html";
});

// 1. โหลดข้อมูลประวัติสวิตช์อุปกรณ์
async function loadHistory() {
    const { data, error } = await supabase
        .from("device_status_logs")
        .select(`
            device_id,
            status,
            changed_at,
            devices(name)
        `);

    if (error) {
        console.error("Supabase History Error:", error);
        return;
    }

    historyData = data || [];
    historyData.sort((a, b) => new Date(b.changed_at) - new Date(a.changed_at));

    filterAndRenderTable(); 
}

// 2. โหลดข้อมูลสิ่งแวดล้อมเพื่อนำมาวาดกราฟรายวัน
async function loadMetrics() {
    const selectedDate = datePicker.value;
    if (!selectedDate) return;

    // ตั้งค่าช่วงเวลาเริ่ม-จบวันในระบบสากล ISO
    const startOfDay = `${selectedDate}T00:00:00.000Z`;
    const endOfDay = `${selectedDate}T23:59:59.999Z`;

    // 🛠️ ตรวจสอบชื่อตาราง "farm_metrics" และฟิลด์ของท่านให้สอดคล้องกันใน Supabase
    const { data, error } = await supabase
        .from("farm_metrics")
        .select("recorded_at, temperature, feed_level, water_level")
        .gte("recorded_at", startOfDay)
        .lte("recorded_at", endOfDay)
        .order("recorded_at", { ascending: true });

    if (error) {
        console.error("Supabase Metrics Error:", error);
        return;
    }

    if (!data || data.length === 0) {
        document.getElementById("chartWrapper").style.display = "none";
        document.getElementById("noDataMessage").style.display = "block";
        return;
    }

    document.getElementById("chartWrapper").style.display = "block";
    document.getElementById("noDataMessage").style.display = "none";

    // สกัดข้อมูลเตรียมส่งเข้าตัวแปรตัวสร้างกราฟ
    const labels = data.map(item => new Date(item.recorded_at).toLocaleTimeString("th-TH", { hour: '2-digit', minute: '2-digit' }));
    const tempData = data.map(item => item.temperature);
    const feedData = data.map(item => item.feed_level);
    const waterData = data.map(item => item.water_level);

    updateChart(labels, tempData, feedData, waterData);
}

// ฟังก์ชันสร้างหรือวาดทับกราฟเส้นสภาพแวดล้อม
function updateChart(labels, tempData, feedData, waterData) {
    const ctx = document.getElementById('farmChart').getContext('2d');
    
    if (farmChart) {
        farmChart.destroy(); // ล้างอินสแตนซ์เก่าออกก่อนเพื่อป้องกันปัญหาบั๊กกราฟซ้อนเวลากดเปลี่ยนวัน
    }

    farmChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '🌡️ อุณหภูมิ (°C)',
                    data: tempData,
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.05)',
                    yAxisID: 'yTemp',
                    tension: 0.2
                },
                {
                    label: '🌾 ปริมาณอาหาร (%)',
                    data: feedData,
                    borderColor: '#f39c12',
                    backgroundColor: 'rgba(243, 156, 18, 0.05)',
                    yAxisID: 'yPercent',
                    tension: 0.2
                },
                {
                    label: '💧 ปริมาณน้ำ (%)',
                    data: waterData,
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.05)',
                    yAxisID: 'yPercent',
                    tension: 0.2
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                yTemp: {
                    type: 'linear',
                    position: 'left',
                    title: { display: true, text: 'อุณหภูมิ (°C)', font: { family: 'Kanit' } }
                },
                yPercent: {
                    type: 'linear',
                    position: 'right',
                    min: 0,
                    max: 100,
                    title: { display: true, text: 'สัดส่วนความจุอาหาร/น้ำ (%)', font: { family: 'Kanit' } },
                    grid: { drawOnChartArea: false } // ปิดเส้นตารางแกนขวาไม่ให้ลายตา
                },
                x: {
                    title: { display: true, text: 'เวลาตรวจสอบ', font: { family: 'Kanit' } }
                }
            }
        }
    });
}

// ฟังก์ชันกรองข้อมูลประวัติตารางสวิตช์บอร์ด
function filterAndRenderTable() {
    const selectedDate = datePicker.value;
    const keyword = document.getElementById("searchInput").value.toLowerCase();

    if (!selectedDate) {
        renderTable([]);
        updateSummary(0);
        return;
    }

    const filtered = historyData.filter(item => {
        if (!item.changed_at) return false;
        
        const logDate = new Date(item.changed_at);
        const itemYear = logDate.getFullYear();
        const itemMonth = String(logDate.getMonth() + 1).padStart(2, '0');
        const itemDay = String(logDate.getDate()).padStart(2, '0');
        const itemDateString = `${itemYear}-${itemMonth}-${itemDay}`;

        const matchesDate = (itemDateString === selectedDate);

        const name = (item.devices?.name || "").toLowerCase();
        const statusText = item.status ? "เปิด" : "ปิด";
        const matchesKeyword = name.includes(keyword) || statusText.includes(keyword);

        return matchesDate && matchesKeyword;
    });

    renderTable(filtered);
    updateSummary(filtered.length);
}

function renderTable(data) {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = `
            <tr>
                <td colspan="3" class="empty">📅 ไม่มีข้อมูลประวัติการสลับสวิตช์ในวันที่เลือก</td>
            </tr>
        `;
        return;
    }

    data.forEach(item => {
        table.innerHTML += `
            <tr>
                <td>${new Date(item.changed_at).toLocaleString("th-TH")}</td>
                <td>${item.devices?.name || "-"}</td>
                <td class="${item.status ? 'on' : 'off'}">
                    ${item.status ? '🟢 เปิด' : '🔴 ปิด'}
                </td>
            </tr>
        `;
    });
}

function updateSummary(count) {
    document.getElementById("dateSummary").textContent = `พบข้อมูลประวัติทั้งหมด ${count} รายการ`;
}

// ดักจับอีเวนต์เมื่อผู้ใช้เลือกเปลี่ยนวันบนปฏิทิน -> สั่งโหลดกราฟและกรองข้อมูลตารางใหม่ทันที
datePicker.addEventListener("change", () => {
    filterAndRenderTable();
    loadMetrics();
});

document.getElementById("searchInput").addEventListener("input", filterAndRenderTable);

// รันระบบดึงข้อมูลครั้งแรก
async function init() {
    await loadHistory();
    await loadMetrics();
}
init();
</script>

</body>
</html>
