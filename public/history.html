<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการทำงาน Smart Farm (รายวัน)</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Kanit',sans-serif;
    background:linear-gradient(135deg,#e8f5e9,#f1f8ff);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:25px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:20px;
}

h1{
    margin:0;
    color:#27ae60;
}

.backBtn{
    border:none;
    background:#27ae60;
    color:white;
    padding:12px 20px;
    border-radius:12px;
    font-family:'Kanit',sans-serif;
    font-size:16px;
    cursor:pointer;
    transition: background 0.2s;
}

.backBtn:hover{
    background:#219150;
}

/* ส่วนเลือกวันที่สไตล์ปฏิทิน */
.calendar-section {
    background: #f9fbf9;
    border: 2px solid #27ae60;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 15px;
}

.calendar-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
}

.calendar-wrapper label {
    font-weight: 600;
    color: #2c3e50;
}

.calendar-section input[type="date"] {
    padding: 10px 15px;
    border: 2px solid #cbd5e1;
    border-radius: 10px;
    font-family: 'Kanit', sans-serif;
    font-size: 16px;
    outline: none;
    color: #333;
    background: white;
}

.calendar-section input[type="date"]:focus {
    border-color: #27ae60;
}

.date-summary {
    font-size: 16px;
    font-weight: 600;
    color: #27ae60;
    background: #e8f5e9;
    padding: 8px 16px;
    border-radius: 20px;
}

.searchBox {
    margin-bottom: 20px;
}

.searchBox input {
    width: 100%;
    padding: 14px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    font-family: 'Kanit', sans-serif;
    font-size: 16px;
    outline: none;
}

.searchBox input:focus {
    border-color: #27ae60;
    box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: linear-gradient(135deg,#2ecc71,#27ae60);
    color: white;
    padding: 15px;
}

td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f5fff7;
}

.on {
    color: #2ecc71;
    font-weight: bold;
}

.off {
    color: #e74c3c;
    font-weight: bold;
}

.empty {
    color: #999;
    padding: 40px;
    font-size: 18px;
}

@media(max-width:768px){
    .top-bar, .calendar-section {
        flex-direction: column;
        align-items: stretch;
    }
    .backBtn {
        width: 100%;
        text-align: center;
    }
    table {
        font-size: 14px;
    }
}
</style>
</head>
<body>

<div class="container">
<div class="card">

    <div class="top-bar">
        <h1>📜 ประวัติการทำงาน Smart Farm</h1>
        <button class="backBtn" id="backBtn">🏠 กลับไปหน้าควบคุม</button>
    </div>

    <div class="calendar-section">
        <div class="calendar-wrapper">
            <label for="datePicker">📅 เลือกวันที่ต้องการดู:</label>
            <input type="date" id="datePicker">
        </div>
        <div class="date-summary" id="dateSummary">พบข้อมูลทั้งหมด 0 รายการ</div>
    </div>

    <div class="searchBox">
        <input type="text" id="searchInput" placeholder="🔍 ค้นหาซ้ำด้วยชื่ออุปกรณ์ภายในวันนั้น...">
    </div>

    <table>
        <thead>
            <tr>
                <th>เวลา</th>
                <th>อุปกรณ์</th>
                <th>สถานะ</th>
            </tr>
        </thead>
        <tbody id="historyTable">
            <tr>
                <td colspan="3" class="empty">กำลังโหลดข้อมูล...</td>
            </tr>
        </tbody>
    </table>

</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://zweosffxlaghnrvimdwx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let historyData = [];

// ตั้งค่าวันที่เริ่มต้นในปฏิทินให้เป็น "วันนี้"
const datePicker = document.getElementById("datePicker");
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth() + 1).padStart(2, '0');
const dd = String(today.getDate()).padStart(2, '0');
datePicker.value = `${yyyy}-${mm}-${dd}`;

// ปุ่มกลับหน้าควบคุม
document.getElementById("backBtn").addEventListener("click", () => {
    location.href = "control.html";
});

// โหลดข้อมูลทั้งหมดมารอไว้
async function loadHistory() {
    // 🛠️ แก้ไขเรียบร้อย: เปลี่ยนคีย์เรียงลำดับเป็น 'changed_at' ตามโครงสร้างจริงใน Supabase ของคุณ
    const { data, error } = await supabase
        .from("device_status_logs")
        .select(`
            device_id,
            status,
            changed_at,
            devices(name)
        `);

    if (error) {
        console.error("Supabase Error:", error);
        alert("เกิดข้อผิดพลาดในการดึงข้อมูล: " + error.message);
        return;
    }

    // จัดเรียงข้อมูลจากเวลาล่าสุดไปอดีตด้วย JavaScript 
    historyData = data || [];
    historyData.sort((a, b) => new Date(b.changed_at) - new Date(a.changed_at));

    filterAndRender(); // กรองตามวันปัจจุบันทันที
}

// ฟังก์ชันกรองข้อมูลผ่านปฏิทินและคำค้นหา
function filterAndRender() {
    const selectedDate = datePicker.value; // ค่าจากปฏิทินรูปแบบ "YYYY-MM-DD"
    const keyword = document.getElementById("searchInput").value.toLowerCase();

    if (!selectedDate) {
        renderTable([]);
        updateSummary(0);
        return;
    }

    const filtered = historyData.filter(item => {
        if (!item.changed_at) return false;
        
        // แปลงเวลาฐานข้อมูลเป็นเขตเวลาท้องถิ่น (YYYY-MM-DD)
        const logDate = new Date(item.changed_at);
        const itemYear = logDate.getFullYear();
        const itemMonth = String(logDate.getMonth() + 1).padStart(2, '0');
        const itemDay = String(logDate.getDate()).padStart(2, '0');
        const itemDateString = `${itemYear}-${itemMonth}-${itemDay}`;

        // เช็กเงื่อนไขปฏิทิน
        const matchesDate = (itemDateString === selectedDate);

        // เช็กเงื่อนไขคำค้นหา
        const name = (item.devices?.name || "").toLowerCase();
        const statusText = item.status ? "เปิด" : "ปิด";
        const matchesKeyword = name.includes(keyword) || statusText.includes(keyword);

        return matchesDate && matchesKeyword;
    });

    renderTable(filtered);
    updateSummary(filtered.length);
}

// นำข้อมูลไปแสดงบนตาราง
function renderTable(data) {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = `
            <tr>
                <td colspan="3" class="empty">📅 ไม่มีข้อมูลประวัติการทำงานในวันที่เลือก</td>
            </tr>
        `;
        return;
    }

    data.forEach(item => {
        table.innerHTML += `
            <tr>
                <td>${new Date(item.changed_at).toLocaleString("th-TH")}</td>
                <td>${item.devices?.name || "-"}</td>
                <td class="${item.status ? 'on' : 'off'}">
                    ${item.status ? '🟢 เปิด' : '🔴 ปิด'}
                </td>
            </tr>
        `;
    });
}

function updateSummary(count) {
    document.getElementById("dateSummary").textContent = `พบข้อมูลทั้งหมด ${count} รายการ`;
}

// ผูกอีเวนต์เข้ากับปฏิทินและช่องค้นหา
datePicker.addEventListener("change", filterAndRender);
document.getElementById("searchInput").addEventListener("input", filterAndRender);

// รันระบบ
loadHistory();
</script>

</body>
</html>
