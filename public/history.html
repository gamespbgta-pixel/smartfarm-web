<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการทำงาน Smart Farm</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Kanit',sans-serif;
    background:linear-gradient(135deg,#e8f5e9,#f1f8ff);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:25px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:20px;
}

h1{
    margin:0;
    color:#27ae60;
}

.backBtn{
    border:none;
    background:#27ae60;
    color:white;
    padding:12px 20px;
    border-radius:12px;
    font-family:'Kanit',sans-serif;
    font-size:16px;
    cursor:pointer;
}

.backBtn:hover{
    background:#219150;
}

.searchBox{
    margin-bottom:20px;
}

.searchBox input{
    width:100%;
    padding:14px;
    border:2px solid #27ae60;
    border-radius:12px;
    font-family:'Kanit',sans-serif;
    font-size:16px;
    outline:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5fff7;
}

.on{
    color:#2ecc71;
    font-weight:bold;
}

.off{
    color:#e74c3c;
    font-weight:bold;
}

.empty{
    color:#999;
    padding:30px;
    font-size:18px;
}

@media(max-width:768px){

.top-bar{
    flex-direction:column;
}

.backBtn{
    width:100%;
}

table{
    font-size:14px;
}

}
</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="top-bar">
<h1>📜 ประวัติการทำงาน Smart Farm</h1>

<button class="backBtn" id="backBtn">
🏠 กลับไปหน้าควบคุม
</button>
</div>

<div class="searchBox">
<input
type="text"
id="searchInput"
placeholder="🔍 ค้นหาชื่ออุปกรณ์ หรือ เปิด/ปิด">
</div>

<table>

<thead>
<tr>
<th>เวลา</th>
<th>อุปกรณ์</th>
<th>สถานะ</th>
</tr>
</thead>

<tbody id="historyTable">

<tr>
<td colspan="3" class="empty">
ไม่มีข้อมูลประวัติ
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL="https://zweosffxlaghnrvimdwx.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE";

const supabase=createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let historyData=[];

// ปุ่มกลับ
document.getElementById("backBtn")
.addEventListener("click",()=>{

location.href="/control.html";

});

// โหลดข้อมูล
async function loadHistory(){

const {data,error}=await supabase
.from("device_status_logs")
.select(`
device_id,
status,
changed_at,
devices(name)
`)
.order("changed_at",{ascending:false});

if(error){

console.log(error);
alert(error.message);
return;

}

historyData=data||[];

renderTable(historyData);

}

// แสดงตาราง
function renderTable(data){

const table=document.getElementById("historyTable");

table.innerHTML="";

if(data.length===0){

table.innerHTML=`
<tr>
<td colspan="3" class="empty">
ไม่มีข้อมูลประวัติ
</td>
</tr>
`;

return;

}

data.forEach(item=>{

table.innerHTML+=`
<tr>

<td>
${new Date(item.changed_at).toLocaleString("th-TH")}
</td>

<td>
${item.devices?.name || "-"}
</td>

<td class="${item.status?'on':'off'}">
${item.status?'🟢 เปิด':'🔴 ปิด'}
</td>

</tr>
`;

});

}

// ค้นหา
document.getElementById("searchInput")
.addEventListener("input",(e)=>{

const keyword=e.target.value.toLowerCase();

const filtered=historyData.filter(item=>{

const name=(item.devices?.name || "").toLowerCase();

const status=item.status ? "เปิด" : "ปิด";

return(
name.includes(keyword) ||
status.includes(keyword)
);

});

renderTable(filtered);

});

loadHistory();

</script>

</body>
</html>
