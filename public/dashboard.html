<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Farm Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* แก้ไขจาก ** เป็น * เพื่อให้ถูกต้องตามหลัก CSS */
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Kanit',sans-serif;
background:linear-gradient(135deg,#e8f5e9,#eef5ff);
}

/* HEADER */
.header{
background:linear-gradient(135deg,#27ae60,#2ecc71);
padding:18px 25px;
color:#fff;
font-size:22px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.backbtn{
background:#fff;
color:#27ae60;
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-family:'Kanit';
font-weight:600;
}

/* STATUS BAR */
.status-bar{
background:#fff;
padding:10px 20px;
display:flex;
gap:15px;
flex-wrap:wrap;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

/* CONTAINER */
.container{
max-width:1300px;
margin:auto;
padding:20px;
}

/* STATUS CARDS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.status-card{
text-align:center;
padding:25px;
border-radius:18px;
color:#fff;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.temp-card{
background:linear-gradient(135deg,#ff7675,#e74c3c);
}

.water-card{
background:linear-gradient(135deg,#74b9ff,#3498db);
}

.food-card{
background:linear-gradient(135deg,#fdcb6e,#f39c12);
}

.icon{
font-size:36px;
margin-bottom:8px;
}

.value{
font-size:40px;
font-weight:600;
}

/* DATE CONTROL */
.date-control{
display:flex;
justify-content:flex-end;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input[type="date"]{
padding:7px 10px;
border-radius:8px;
border:1px solid #ccc;
font-family:'Kanit';
}

button{
padding:7px 14px;
border:none;
border-radius:8px;
background:#2ecc71;
color:#fff;
cursor:pointer;
font-family:'Kanit';
}

/* CHARTS */
.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
margin-bottom:25px;
}

.chart-card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.chart-card canvas{
height:230px !important;
}

/* TABLE */
.card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#2ecc71;
color:#fff;
padding:10px;
}

td{
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#f6f6f6;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
.container{
padding:15px;
}

.grid{
grid-template-columns:1fr;
}

.chart-grid{
grid-template-columns:1fr;
}

.value{
font-size:46px;
}

.date-control{
justify-content:center;
}

button{
width:100%;
}

input[type="date"]{
width:100%;
}

table{
display:block;
overflow-x:auto;
}
}
</style>
</head>

<body>

<div class="header">
🌱 Smart Farm Dashboard
<button class="backbtn" onclick="location.href='control.html'">⬅ กลับ</button>
</div>

<div class="status-bar">
<div class="status" id="serverStatus">🟡 Server Connecting...</div>
<div class="status" id="wsStatus">❌ WebSocket Disconnected</div>
</div>

<div class="container">

<div class="grid">
<div class="status-card temp-card">
<div class="icon">🌡</div>
<div class="value" id="tempValue">-- °C</div>
อุณหภูมิ
</div>

<div class="status-card water-card">
<div class="icon">💧</div>
<div class="value" id="waterValue">-- %</div>
ปริมาณน้ำ
</div>

<div class="status-card food-card">
<div class="icon">🍚</div>
<div class="value" id="foodValue">-- %</div>
ปริมาณอาหาร
</div>
</div>

<div class="date-control">
<input type="date" id="datePicker">
<button onclick="loadLast7Days()">7 วันล่าสุด</button>
</div>

<div class="chart-grid">
<div class="chart-card">
<h3>📈 กราฟอุณหภูมิ</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="chart-card">
<h3>📈 กราฟปริมาณน้ำ</h3>
<canvas id="waterChart"></canvas>
</div>

<div class="chart-card">
<h3>📈 กราฟปริมาณอาหาร</h3>
<canvas id="foodChart"></canvas>
</div>
</div>

<div class="card">
<h3>📋 ประวัติการทำงานของอุปกรณ์</h3>
<table>
<thead>
<tr>
<th>เวลา</th>
<th>อุปกรณ์</th>
<th>สถานะ</th>
</tr>
</thead>
<tbody id="relayTable"></tbody>
</table>
</div>

</div>

<script>
/* TEMPERATURE */
let temps=[]
let labels=[]

const tempChart=new Chart(
document.getElementById("tempChart"),
{
type:"line",
data:{
labels:labels,
datasets:[{
data:temps,
borderColor:"#e74c3c",
backgroundColor:"rgba(231,76,60,0.2)",
fill:true,
tension:.3
}]
},
options:{plugins:{legend:{display:false}}, responsive: true, maintainAspectRatio: false}
})

/* WATER */
let waters=[]
let waterLabels=[]

const waterChart=new Chart(
document.getElementById("waterChart"),
{
type:"line",
data:{
labels:waterLabels,
datasets:[{
data:waters,
borderColor:"#3498db",
backgroundColor:"rgba(52,152,219,0.2)",
fill:true,
tension:.3
}]
},
options:{plugins:{legend:{display:false}}, responsive: true, maintainAspectRatio: false}
})

/* FOOD */
let foods=[]
let foodLabels=[]

const foodChart=new Chart(
document.getElementById("foodChart"),
{
type:"line",
data:{
labels:foodLabels,
datasets:[{
data:foods,
borderColor:"#f39c12",
backgroundColor:"rgba(243,156,18,0.2)",
fill:true,
tension:.3
}]
},
options:{plugins:{legend:{display:false}}, responsive: true, maintainAspectRatio: false}
})

/* WEBSOCKET (แก้ไขเพื่อเชื่อมต่อกับ Render) */
let ws

function connectWS(){
    // ชี้เป้าไปยังโดเมนของ Render ของคุณโดยตรง
    const renderHost = "smartfarm-server-fuos.onrender.com";
    
    document.getElementById("serverStatus").innerText = "🟡 Server Connecting...";
    document.getElementById("wsStatus").innerText = "❌ WebSocket Disconnected";

    // บังคับใช้ wss:// เสมอ
    ws = new WebSocket("wss://" + renderHost);

    ws.onopen=()=>{
        document.getElementById("serverStatus").innerText = "🟢 Server Online";
        document.getElementById("wsStatus").innerText = "📡 WebSocket Connected";
        ws.send(JSON.stringify({type:"dashboard"}));
    }

    ws.onmessage=(event)=>{
        const data=JSON.parse(event.data);
        const timeLabel = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        if(data.type==="temperature"){
            document.getElementById("tempValue").innerText=data.temperature+" °C";
            labels.push(timeLabel);
            temps.push(data.temperature);

            if(labels.length>100){
                labels.shift();
                temps.shift();
            }
            tempChart.update();
        }

        if(data.type==="water"){
            document.getElementById("waterValue").innerText=data.water+" %";
            waterLabels.push(timeLabel);
            waters.push(data.water);

            if(waterLabels.length>100){
                waterLabels.shift();
                waters.shift();
            }
            waterChart.update();
        }

        if(data.type==="food"){
            document.getElementById("foodValue").innerText=data.food+" %";
            foodLabels.push(timeLabel);
            foods.push(data.food);

            if(foodLabels.length>100){
                foodLabels.shift();
                foods.shift();
            }
            foodChart.update();
        }
        
        // ดักจับข้อมูลประวัติรีเลย์เพิ่มเติม (ถ้าฝั่ง backend ส่งข้อมูลการสั่งงานอุปกรณ์มาด้วย)
        if(data.type === "relay_history" || data.device) {
            const table = document.getElementById("relayTable");
            const row = table.insertRow(0); // แทรกแถวใหม่ไว้บนสุด
            row.innerHTML = `
                <td>${timeLabel}</td>
                <td>${data.device || data.name || 'อุปกรณ์'}</td>
                <td style="color: ${data.status === 'on' ? '#2ecc71' : '#e74c3c'}; font-weight: bold;">
                    ${(data.status || 'unknown').toUpperCase()}
                </td>
            `;
            // จำกัดจำนวนแถวประวัติในตารางไม่ให้ยาวเกินไป (เช่นแสดงแค่ 10 รายการล่าสุด)
            if(table.rows.length > 10) {
                table.deleteRow(table.rows.length - 1);
            }
        }
    }

    ws.onclose=()=>{
        document.getElementById("serverStatus").innerText = "🔴 Server Offline";
        document.getElementById("wsStatus").innerText = "❌ WebSocket Disconnected";
        // ปรับเป็น 5 วินาที เพื่อความเสถียรและลดภาระเบราว์เซอร์ตอนเซิร์ฟเวอร์ Spin down
        setTimeout(connectWS, 5000);
    }
    
    ws.onerror=(err)=>{
        console.error("WebSocket Error: ", err);
    }
}

// ฟังก์ชันจำลองรองรับปุ่มกด (คุณต้องเขียนดึง API ของฐานข้อมูลเพิ่มที่ฝั่ง Backend หากต้องการใช้จริง)
function loadLast7Days() {
    alert("ระบบกำลังดึงประวัติย้อนหลัง 7 วันจากฐานข้อมูลบนเซิร์ฟเวอร์...");
}

connectWS();
</script>

</body>
</html>
