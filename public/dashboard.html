<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Smart Farm</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:'Kanit',sans-serif;
    background:linear-gradient(135deg,#f1f8ff,#e8f5e9);
}
.header{
    background:linear-gradient(135deg,#2c3e50,#34495e);
    padding:16px 28px;
    color:#fff;
    font-size:20px;
    font-weight:600;
    position:relative;
}
.back-btn {
    position:absolute;
    left:20px;
    top:12px;
    background:#fff;
    color:#2c3e50;
    border:none;
    padding:8px 16px;
    border-radius:12px;
    cursor:pointer;
    font-weight: 600;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}
/* ออกแบบตารางแสดงผลให้ดูง่าย */
.status-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,.05);
}
.status-table th, .status-table td {
    padding: 18px;
    text-align: left;
    border-bottom: 1px solid #edf2f7;
}
.status-table th {
    background-color: #f8fafc;
    color: #4a5568;
    font-weight: 600;
}
/* สไตล์สำหรับป้ายสถานะ ON/OFF */
.badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
    display: inline-block;
}
.badge.on { background: #e6fffa; color: #234e52; border: 1px solid #b2f5ea; }
.badge.off { background: #fff5f5; color: #742a2a; border: 1px solid #fed7d7; }
</style>
</head>

<body>

<div class="header" style="text-align: center;">
    <button class="back-btn" onclick="goBack()">← กลับหน้าหลัก</button>
    📊 หน้าแสดงสถานะรวม (Dashboard)
</div>

<div class="container">
    <table class="status-table">
        <thead>
            <tr>
                <th>ชื่ออุปกรณ์</th>
                <th>ขา GPIO</th>
                <th>สถานะปัจจุบัน</th>
                <th>ตั้งเวลาเปิด</th>
                <th>ตั้งเวลาปิด</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td colspan="5" style="text-align: center; color: #a0aec0;">กำลังโหลดข้อมูลจากคลาวด์...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
// 2. ตั้งค่าการเชื่อมต่อ Supabase (ใช้ URL และ KEY เดียวกับหน้าแรก)
const SUPABASE_URL = "https://kfdngjrmowoiprottymh.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmZG5nanJtb3dvaXByb3R0eW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTEwODUsImV4cCI6MjA5NjkyNzA4NX0.Gk49kkH0L0Ti0LN6jEBdpDHcSfEbV4zB93v_RTr_UvI";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ฟังก์ชันดึงข้อมูลมาแสดงในตาราง
async function fetchDashboardData() {
    const tableBody = document.getElementById('tableBody');
    
    // ดึงข้อมูลทั้งหมดจากตาราง devices
    const { data, error } = await supabase
        .from('devices')
        .select('*')
        .order('id', { ascending: true });

    if (error) {
        console.error("เกิดข้อผิดพลาดในการดึงข้อมูล:", error.message);
        tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">โหลดข้อมูลล้มเหลว: ${error.message}</td></tr>`;
        return;
    }

    // ถ้าไม่มีข้อมูลเลย
    if (data.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #718096;">ยังไม่มีอุปกรณ์ในระบบ</td></tr>`;
        return;
    }

    // ล้างข้อความ "กำลังโหลด..." ออกเพื่อเตรียมใส่ข้อมูลจริง
    tableBody.innerHTML = "";

    // วนลูปสร้างแถวตาราง (Row) ตามจำนวนอุปกรณ์ที่ดึงมาได้
    data.forEach(device => {
        const row = document.createElement('tr');
        
        // เช็คสถานะเพื่อใส่สีป้าย Badge
        const stateClass = device.state.toLowerCase() === 'on' ? 'on' : 'off';
        const stateText = device.state.toUpperCase();

        row.innerHTML = `
            <td style="font-weight: 600; color: #2d3748;">🌱 ${device.name}</td>
            <td><code style="background: #edf2f7; padding: 4px 8px; border-radius: 6px;">GPIO ${device.pin}</code></td>
            <td><span class="badge ${stateClass}">${stateText}</span></td>
            <td>⏰ ${device.time_on || "-"}</td>
            <td>⏰ ${device.time_off || "-"}</td>
        `;
        
        tableBody.appendChild(row);
    });
}

function goBack() {
    location.href = "index.html"; // เปลี่ยนเป็นชื่อไฟล์หน้าแรกของคุณ
}

// สั่งให้ทำงานทันทีเมื่อเปิดหน้านี้ขึ้นมา
fetchDashboardData();

// (ตัวเลือกเสริม) สั่งให้ดึงข้อมูลใหม่ทุกๆ 5 วินาที เพื่อให้สถานะอัปเดตอัตโนมัติ
setInterval(fetchDashboardData, 5000);
</script>

</body>
</html>
