<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Farm - ระบบสมาชิก</title>
    <style>
        /* ... สไตล์เดิมของคุณ ... */
        .forgot-link { text-align: center; margin-top: 10px; font-size: 13px; color: #777; cursor: pointer; }
    </style>
</head>
<body>

<div class="container-box">
    <div class="logo">🌱</div>
    <div id="form-title" class="title">Smart Farm Login</div>

    <form id="auth-form">
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
        <div id="password-group" class="input-group">
            <label>Password (6 ตัวขึ้นไป)</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit" id="btn-submit" class="btn-action">เข้าสู่ระบบ</button>
    </form>

    <div id="message-display" class="message"></div>
    <div id="forgot-password-link" class="forgot-link">ลืมรหัสผ่าน?</div>
    <div id="toggle-view" class="toggle-link">ยังไม่มีบัญชี? สมัครสมาชิกที่นี่</div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    const supabase = createClient("https://zweosffxlaghnrvimdwx.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZW9zZmZ4bGFnaG5ydmltZHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDU0MDgsImV4cCI6MjA5NzUyMTQwOH0.7mlHv9Vl5mo0RLRFUfDB1D75L3OaHKoqpBNh0xfG2JE");

    let mode = 'login'; // login, signup, forgot

    const formTitle = document.getElementById("form-title");
    const btnSubmit = document.getElementById("btn-submit");
    const toggleView = document.getElementById("toggle-view");
    const forgotLink = document.getElementById("forgot-password-link");
    const passwordGroup = document.getElementById("password-group");
    const messageDisplay = document.getElementById("message-display");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const authForm = document.getElementById("auth-form");

    // ฟังก์ชันสลับโหมด
    function setMode(newMode) {
        mode = newMode;
        messageDisplay.innerText = "";
        if (mode === 'login') {
            formTitle.innerText = "Smart Farm Login";
            btnSubmit.innerText = "เข้าสู่ระบบ";
            passwordGroup.style.display = "block";
            toggleView.style.display = "block";
            forgotLink.style.display = "block";
        } else if (mode === 'signup') {
            formTitle.innerText = "สมัครสมาชิกฟาร์ม";
            btnSubmit.innerText = "ลงทะเบียน";
            passwordGroup.style.display = "block";
            toggleView.style.display = "block";
            forgotLink.style.display = "none";
        } else {
            formTitle.innerText = "กู้คืนรหัสผ่าน";
            btnSubmit.innerText = "ส่งอีเมลยืนยัน";
            passwordGroup.style.display = "none";
            toggleView.style.display = "block";
            forgotLink.style.display = "none";
        }
    }

    toggleView.addEventListener("click", () => setMode(mode === 'login' ? 'signup' : 'login'));
    forgotLink.addEventListener("click", () => setMode('forgot'));

    authForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        
        if (mode === 'forgot') {
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html', // หน้าที่คุณต้องสร้างเพื่อกรอกรหัสใหม่
            });
            messageDisplay.innerText = error ? "ผิดพลาด: " + error.message : "ส่งอีเมลรีเซ็ตรหัสผ่านแล้ว กรุณาตรวจสอบกล่องจดหมาย";
            messageDisplay.className = error ? "message error-text" : "message success-text";
        } else {
            // โค้ดเดิมสำหรับ Login/Signup...
            // (ใส่ logic เดิมของคุณที่นี่)
        }
    });
</script>
</body>
</html>
