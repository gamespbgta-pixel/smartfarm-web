<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm - ระบบสมาชิก</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Kanit',sans-serif; }
body { height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#4CAF50,#2E7D32); }
.container-box { width:350px; background:white; padding:30px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,.2); }
.logo { text-align:center; font-size:32px; margin-bottom:10px; }
.title { text-align:center; font-size:24px; font-weight:600; margin-bottom:25px; color:#2E7D32; }
.input-group { margin-bottom:15px; }
.input-group label { display:block; margin-bottom:5px; color: #555; }
.input-group input { width:100%; padding:12px; border:1px solid #ccc; border-radius:10px; font-size:16px; outline: none; }
.input-group input:focus { border-color: #4CAF50; box-shadow: 0 0 5px rgba(76, 175, 80, 0.3); }
.btn-action { width:100%; padding:12px; border:none; border-radius:10px; background:#4CAF50; color:white; font-size:18px; cursor:pointer; transition:.3s; margin-top: 10px; }
.btn-action:hover { background:#388E3C; }
.message { text-align:center; margin-top:15px; font-size:14px; min-height: 20px; }
.error-text { color: red; }
.success-text { color: green; }
.toggle-link { text-align:center; margin-top:15px; font-size:14px; color:#2E7D32; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>

<div class="container-box">
    <div class="logo">🌱</div>
    <div id="form-title" class="title">Smart Farm Login</div>

    <form id="auth-form" onsubmit="handleSubmit(event)">
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
        <div class="input-group">
            <label>Password (6 ตัวขึ้นไป)</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit" id="btn-submit" class="btn-action">เข้าสู่ระบบ</button>
    </form>

    <div id="message-display" class="message"></div>
    <div id="toggle-view" class="toggle-link" onclick="toggleForm()">ยังไม่มีบัญชี? สมัครสมาชิกที่นี่</div>
</div>

<script>
// ⚠️ ใส่คีย์เชื่อมต่อของโปรเจกต์คุณตรงนี้ครับ
const SUPABASE_URL = "https://kfdngjrmowoiprottymh.supabase.co"; // ใส่ลิงก์จากรูปให้แล้วครับ
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmZG5nanJtb3dvaXByb3R0eW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTEwODUsImV4cCI6MjA5NjkyNzA4NX0.Gk49kkH0L0Ti0LN6jEBdpDHcSfEbV4zB93v_RTr_UvI";

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let isLoginMode = true;

function toggleForm() {
    isLoginMode = !isLoginMode;
    const formTitle = document.getElementById("form-title");
    const btnSubmit = document.getElementById("btn-submit");
    const toggleView = document.getElementById("toggle-view");
    const messageDisplay = document.getElementById("message-display");
    
    messageDisplay.innerText = "";
    
    if (isLoginMode) {
        formTitle.innerText = "Smart Farm Login";
        btnSubmit.innerText = "เข้าสู่ระบบ";
        toggleView.innerText = "ยังไม่มีบัญชี? สมัครสมาชิกที่นี่";
    } else {
        formTitle.innerText = "สมัครสมาชิกฟาร์ม";
        btnSubmit.innerText = "ลงทะเบียน";
        toggleView.innerText = "มีบัญชีอยู่แล้ว? เข้าสู่ระบบที่นี่";
    }
}

async function handleSubmit(event) {
    event.preventDefault();
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const messageDisplay = document.getElementById("message-display");

    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    messageDisplay.innerText = "";
    messageDisplay.className = "message";

    if (isLoginMode) {
        // 🚀 สั่งล็อกอินผ่าน Supabase
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            messageDisplay.innerText = "เกิดข้อผิดพลาด: " + error.message;
            messageDisplay.classList.add("error-text");
        } else {
            messageDisplay.innerText = "เข้าสู่ระบบสำเร็จ! กำลังพาไปหน้าควบคุม...";
            messageDisplay.classList.add("success-text");
            
            // ล็อกอินผ่านปุ๊บ ส่งพุ่งตรงไปที่หน้าควบคุมทันที
            setTimeout(() => { 
                window.location.href = "control.html"; 
            }, 1500);
        }
    } else {
        // 🚀 สั่งลงทะเบียนผ่าน Supabaseแบบธรรมดา ไม่ต้องแนบข้อมูลสิทธิ์ให้วุ่นวาย
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            messageDisplay.innerText = "ลงทะเบียนไม่สำเร็จ: " + error.message;
            messageDisplay.classList.add("error-text");
        } else {
            messageDisplay.innerText = "ลงทะเบียนสำเร็จเรียบร้อยแล้ว!";
            messageDisplay.classList.add("success-text");
            setTimeout(() => {
                toggleForm();
                passwordInput.value = "";
            }, 2000);
        }
    }
}
</script>
</body>
</html>
